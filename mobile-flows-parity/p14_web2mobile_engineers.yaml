appId: com.hydrocert.app
name: "PARITY p14 - web-to-mobile second engineer (visit screen)"
tags: [parity, web2mobile]
---
# A SECOND engineer was added to the visit via the web API in phase 0 (check 2l, PATCH /visits/{id}
# {engineerIds:[existing, second]}). It reads back on GET /visits.visitEngineers (write field
# engineerIds, read field visitEngineers — the drift note, probe-verified 2026-05-30). SCORED via API
# (checkEngineerCount on GET /visits.visitEngineers.length >= 2); this flow captures the MOBILE-side
# photo only ({flow}-after.png) and runs `|| true` in the orchestrator.
#
# RENDER GAP (verified 2026-05-31 against tmp-hydrocert-android): the mobile app has NO engineers
# list/chip UI — there is no engineer-render composable on the visit screen (the visit summary shows
# Purchase Ord. / Site Code / Visit Ref. / access info / actions, but not an engineers list). So 2l is
# API + WEB evidenced only (the web visit header shows BOTH engineers). GUARDRAIL: the setup PATCH KEEPS
# parity.bot (the mobile QA login) so the visit still surfaces. This flow captures a CLEAN visit-screen
# photo instead of scrolling for a non-existent Engineers section. Documented in
# docs/PARITY-SS-VERIFICATION.md.
- runFlow: _shared/open_tagged_visit.yaml
- waitForAnimationToEnd:
    timeout: 4000
