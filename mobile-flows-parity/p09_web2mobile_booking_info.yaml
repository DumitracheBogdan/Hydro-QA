appId: com.hydrocert.app
name: "PARITY p09 - web-to-mobile site booking/access info"
tags: [parity, web2mobile]
---
# site.accessInfo was PATCHed onto the SITE record via API in phase 0 (check 4b, PATCH /sites/{id}).
# SCORED via API (checkScalarField on GET /sites/{siteId}.accessInfo); this flow captures the
# MOBILE-side photo only ({flow}-after.png) and runs `|| true` in the orchestrator.
#
# The mobile visit summary renders the access info VALUE directly (TaskDetailsSummaryTab.kt:247 ->
# taskDetails.getAccessInfo()), so scroll to the ACTUAL value text (not a "Booking/Access" heading,
# which the previous version missed -> the after-shot landed on the Actions card). optional:true so a
# non-render degrades to one clean photo instead of burning a retry.
- runFlow: _shared/open_tagged_visit.yaml
- scrollUntilVisible:
    element: { text: ".*PARITY-${RUN_ID} booking.*" }
    direction: DOWN
    timeout: 20000
    optional: true
- waitForAnimationToEnd:
    timeout: 4000
