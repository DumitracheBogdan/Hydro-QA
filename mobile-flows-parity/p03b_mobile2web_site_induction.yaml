appId: com.hydrocert.app
name: "PARITY p03b - mobile-to-web Site Induction dropdown"
tags: [parity, mobile2web]
---
- runFlow: _shared/open_inspection.yaml
- tapOn: "Visit Information"
- scrollUntilVisible:
    element: { text: "Site Induction required & Completed" }
    direction: DOWN
    timeout: 15000
# Open the ExposedDropdownMenu and pick a fixed option (anchored so it does not also match
# "Yes - Induction not completed ...").
- tapOn:
    below: { text: "Site Induction required & Completed" }
- extendedWaitUntil:
    visible: "^Yes - Induction completed$"
    timeout: 8000
- tapOn: "^Yes - Induction completed$"
- scrollUntilVisible:
    element: { text: "^Save$" }
    direction: DOWN
    timeout: 30000
    speed: 40
- tapOn: "^Save$"
- waitForAnimationToEnd:
    timeout: 5000
# Evidence positioning (photo-only, all optional so it can NEVER fail the gated write above): after
# Save the screen returns to the inspection Actions area, so re-open Visit Information and scroll back to
# the Site Induction field, so the after-shot shows the dropdown value instead of the Actions screen.
- tapOn:
    text: "Visit Information"
    optional: true
- scrollUntilVisible:
    element: { text: "Site Induction required & Completed" }
    direction: DOWN
    timeout: 10000
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
