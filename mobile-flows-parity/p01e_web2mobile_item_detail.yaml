appId: com.hydrocert.app
name: "PARITY p01e - web-to-mobile inspection item detail (LocationCard)"
tags: [parity, web2mobile]
---
# itemDetail was PATCHed onto the inspection via API in phase 0. The mobile LocationCard on the
# inspection screen renders itemDetail read-only (R3). Assert the seeded value is visible. (A5/2g)
# Verified renders on mobile (CI run 26607132325, 10/10) -> 2g is hard-gated.
- runFlow: _shared/open_inspection.yaml
- scrollUntilVisible:
    element: { text: ".*PARITY-${RUN_ID} item-detail.*" }
    direction: DOWN
    timeout: 20000
- assertVisible: ".*PARITY-${RUN_ID} item-detail.*"
