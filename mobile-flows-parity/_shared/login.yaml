appId: com.hydrocert.app
name: "Parity Shared - Login"
tags: [shared, login]
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      text: "Forgot.*"
    timeout: 45000
- tapOn:
    text: "^Email$"
- inputText: ${MAESTRO_APP_EMAIL}
- hideKeyboard
- tapOn:
    text: "^Password$"
- inputText: ${MAESTRO_APP_PASSWORD}
- hideKeyboard
- tapOn:
    text: "^Login$"
- extendedWaitUntil:
    visible: ".*overview of your visits.*"
    timeout: 90000
