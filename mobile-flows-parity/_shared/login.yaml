appId: com.hydrocert.app
name: "Parity Shared - Login (debug build defaults to DEV)"
tags: [shared, login]
---
- extendedWaitUntil:
    visible:
      text: "Forgot.*"
    timeout: 60000
- tapOn:
    text: "^Email$"
- inputText: ${MAESTRO_APP_EMAIL}
- hideKeyboard
- tapOn:
    text: "^Password$"
- inputText: ${MAESTRO_APP_PASSWORD}
- hideKeyboard
- tapOn:
    text: "^Login$"
- extendedWaitUntil:
    visible: ".*overview of your visits.*"
    timeout: 90000
