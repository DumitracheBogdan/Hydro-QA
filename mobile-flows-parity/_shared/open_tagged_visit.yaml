appId: com.hydrocert.app
name: "Parity Shared - Open tagged visit by reference"
tags: [shared, navigation]
---
- runFlow: login.yaml
# Search for the run's visit by reference (VISIT_REF), then open it.
- tapOn:
    text: "Type to search.*"
- inputText: ${VISIT_REF}
- hideKeyboard
# "View Visit Details" sits below the fold on smaller CI emulators -> scroll to it.
- scrollUntilVisible:
    element:
      text: "View Visit Details"
    direction: DOWN
    timeout: 25000
- tapOn: "View Visit Details"
- extendedWaitUntil:
    visible: "Inspections.*"
    timeout: 20000
