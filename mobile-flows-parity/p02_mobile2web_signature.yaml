appId: com.hydrocert.app
name: "PARITY p02 - mobile-to-web signature"
tags: [parity, mobile2web]
---
- runFlow: _shared/open_tagged_visit.yaml
- tapOn:
    text: "Visit Details"
- scrollUntilVisible:
    element: { text: "Client Signature" }
    direction: DOWN
    timeout: 20000
- tapOn: "Client Signature"
- scrollUntilVisible:
    element: { text: "Client name" }
    direction: DOWN
    timeout: 15000
- tapOn:
    below: { text: "Client name" }
- eraseText
- inputText: "PARITY-${RUN_ID} Client"
- hideKeyboard
- tapOn: "Client name"
- scrollUntilVisible:
    element: { text: "Tap to sign" }
    direction: DOWN
    timeout: 15000
- tapOn:
    text: "Tap to sign"
- extendedWaitUntil:
    visible: "Submit"
    timeout: 12000
- swipe:
    start: "30%, 45%"
    end: "70%, 50%"
- swipe:
    start: "40%, 42%"
    end: "60%, 55%"
- swipe:
    start: "58%, 43%"
    end: "42%, 54%"
- tapOn: "Submit"
- scrollUntilVisible:
    element: { text: "^Save$" }
    direction: DOWN
    timeout: 25000
    speed: 40
- tapOn: "^Save$"
- scrollUntilVisible:
    element: { text: "Client Signature" }
    direction: UP
    timeout: 12000
    speed: 40
