appId: com.hydrocert.app
name: "PARITY p13 - web-to-mobile per-sample note (inspection screen)"
tags: [parity, web2mobile]
---
# A NOTE was POSTed to the FIRST laboratorySample of the inspection via the web API in phase 0 (check
# 2k, POST /laboratory-samples/{sampleId}/notes {noteText}). It reads back on GET
# /laboratory-samples/{id}.sampleNote.noteText (the flat .notes field stays null — probe-verified
# 2026-05-30). SCORED via API (checkSampleNote on GET /laboratory-samples/{sampleId}); this flow captures
# the MOBILE-side photo only ({flow}-after.png) and runs `|| true` in the orchestrator.
#
# RENDER GAP (same as 2h): the parity jobType 658f27c1 has NO mobile Water-Sampling UI section (it needs
# a requiresWaterSample jobType), so there is no mobile surface to show the per-sample note. So 2k is API
# + WEB evidenced only (the web Lab Results tab shows the sample + its note). This flow captures a CLEAN
# inspection-screen photo instead of scrolling for a non-existent Water Sampling section. GUARDRAIL:
# read-only navigation — NEVER taps "Submit Samples" (would transmit to Normec/ALS — forbidden).
# Documented in docs/PARITY-SS-VERIFICATION.md.
- runFlow: _shared/open_inspection.yaml
- waitForAnimationToEnd:
    timeout: 4000
