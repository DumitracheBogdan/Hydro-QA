appId: com.hydrocert.app
name: "PARITY p03 - mobile-to-web visit info"
tags: [parity, mobile2web]
---
- runFlow: _shared/open_inspection.yaml
- tapOn: "Visit Information"
- extendedWaitUntil:
    visible: "Assisting 1"
    timeout: 12000
# eraseText before each inputText: the run_flow retry-once can re-enter a field that already holds
# attempt-1's saved value; inputText appends (no implicit clear), so without eraseText a retry would
# double the value ("Inspector 1Inspector 1") and the exact-match verify (3b) would FAIL (M5).
- tapOn:
    below: { text: "Assisting 1" }
- eraseText
- inputText: "PARITY-${RUN_ID} Inspector 1"
- hideKeyboard
- tapOn:
    below: { text: "Assisting 2" }
- eraseText
- inputText: "PARITY-${RUN_ID} Inspector 2"
- hideKeyboard
- scrollUntilVisible:
    element: { text: "Assisting 3" }
    direction: DOWN
    timeout: 15000
- tapOn:
    below: { text: "Assisting 3" }
- eraseText
- inputText: "PARITY-${RUN_ID} Inspector 3"
- hideKeyboard
- tapOn: "Assisting 3"
- scrollUntilVisible:
    element: { text: "Works being carried out" }
    direction: DOWN
    timeout: 15000
- tapOn:
    below: { text: "Works being carried out" }
- eraseText
- inputText: "PARITY-${RUN_ID} Works"
- hideKeyboard
- tapOn: "Works being carried out"
- scrollUntilVisible:
    element: { text: "^Save$" }
    direction: DOWN
    timeout: 30000
    speed: 30
- tapOn: "^Save$"
- scrollUntilVisible:
    element: { text: "Visit Information" }
    direction: UP
    timeout: 12000
    speed: 40
