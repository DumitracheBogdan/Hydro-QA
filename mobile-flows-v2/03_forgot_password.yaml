appId: com.hydrocert.app
name: "MOB03 V2 - Forgot password screen"
tags:
  - login
  - forgot-password
  - smoke
---

# Source of truth: discovery/hierarchies/02-forgot-password-screen.xml
# Texts on screen: Back to Login, Forgot your password?, Email,
#                  Send steps, and the help blurb.
# Clickable: Back to Login, Email field, Send steps button.

- launchApp:
    clearState: true

# Wait for the login screen to be ready via the Forgot link
- extendedWaitUntil:
    visible:
      text: "Forgot.*"
    timeout: 45000

# --- Open Forgot password ---
- tapOn:
    text: "Forgot.*"

# --- Wait for forgot password screen to load ---
- extendedWaitUntil:
    visible:
      text: "Send steps"
    timeout: 30000

# --- Assert all visible copy ---
- assertVisible: "Back to Login"
- assertVisible: "Forgot your password.*"
- assertVisible:
    text: ".*Enter the email.*"
- assertVisible: "Send steps"

# --- Type into Email just to confirm the field is live ---
- tapOn:
    text: "^Email$"
- inputText: "forgot.qa@example.com"
- hideKeyboard

# NOTE: we intentionally DO NOT tap "Send steps" so no real reset
# email is sent from CI.

# --- Tap Back to Login and confirm we are on the login screen ---
- tapOn:
    text: "Back to Login"
- extendedWaitUntil:
    visible:
      text: "Forgot.*"
    timeout: 30000
