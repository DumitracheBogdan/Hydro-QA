appId: com.hydrocert.app
name: "MOB38 V2 - E2E save and data persistence"
tags:
  - e2e
  - save
  - critical
---

# Opens a visit, edits a text field, saves, navigates back,
# re-opens the visit, and verifies the data persisted.
#
# Uses Visits Home visit (QA test) for persistence check.

- runFlow: _shared/open_visits_home_visit.yaml

# --- Tap Visit Details tab and expand accordion ---
- tapOn: "Visit Details"
- tapOn:
    text: "Visit Details"
    index: 1

# --- Scroll to Description field ---
- scrollUntilVisible:
    element:
      text: "Enter description.*|Description"
    direction: DOWN
    timeout: 15000

# --- Edit Description & Reference field ---
- tapOn: "Enter description.*|Description"
- inputText: "Maestro CI E2E Test"

# --- Dismiss keyboard without triggering navigation or unsaved-data dialog ---
# On CI emulator inputText injects directly (no keyboard shown), so `back`
# navigates instead of dismissing. hideKeyboard is safe: no dialog, no nav.
- hideKeyboard

# --- Scroll to Aborted visit toggle (Save is visible just below it — per flow 25) ---
# Skip tapOn/unfocus: scroll events go to parent ScrollView even with field focused.
# Target "Aborted visit" not "Save": stops before page bottom, avoids scroll
# gestures overshooting into the bottom navigation bar.
- scrollUntilVisible:
    element:
      text: "Aborted visit"
    direction: DOWN
    timeout: 30000
    speed: 40

# --- Tap Save ---
- tapOn: "Save"

# --- Wait for save to process ---
- extendedWaitUntil:
    visible: "Save"
    timeout: 5000

# --- Navigate back to Visits Home ---
- back
- tapOn:
    text: "Go back"
    optional: true

# --- Verify back on Visits Home ---
- extendedWaitUntil:
    visible: ".*overview of your visits.*"
    timeout: 15000

# --- Re-open same visit ---
- scrollUntilVisible:
    element:
      text: "View Visit Details"
    direction: DOWN
    timeout: 20000
- tapOn: "View Visit Details"
- extendedWaitUntil:
    visible: "Inspections.*"
    timeout: 15000

# --- Tap Visit Details tab and expand accordion again ---
- tapOn: "Visit Details"
- tapOn:
    text: "Visit Details"
    index: 1

# --- Verify data persisted (scroll to description area) ---
- scrollUntilVisible:
    element:
      text: "Maestro CI E2E Test"
    direction: DOWN
    timeout: 15000
