appId: com.hydrocert.app
name: "MOB38 V2 - E2E save and data persistence"
tags:
  - e2e
  - save
  - critical
---

# Opens a visit, edits a text field, saves, navigates back,
# re-opens the visit, and verifies the data persisted.
#
# Uses Visits Home visit (QA test) for persistence check.

- runFlow: _shared/open_visits_home_visit.yaml

# --- Tap Visit Details tab and expand accordion ---
- tapOn: "Visit Details"
- tapOn:
    text: "Visit Details"
    index: 1

# --- Scroll to Description & Reference field ---
# NOTE: Use the concrete field label "Description & Reference" (android.widget.TextView),
# NOT the hint text "Enter description.*". On API 30 CI emulator, Compose TextField
# hints are not exposed as findable text nodes (EditText has text="" and the hint
# child node is not searchable). The field label IS a findable node and is unique.
# Also do NOT use "Description" alone — the read-only visit info header shows a
# "Description" label first in the hierarchy, which is non-interactive.
# In Compose OutlinedTextField layouts, tapping the label activates the adjacent EditText.
- scrollUntilVisible:
    element:
      text: "Description & Reference"
    direction: DOWN
    timeout: 15000

# --- Edit Description & Reference field ---
# Do NOT tap the label text "Description & Reference" — on API 30 CI emulator,
# tapping a Compose OutlinedTextField label does NOT transfer focus to the EditText.
# Use below: to tap the EditText that sits directly below the label instead.
- tapOn:
    below:
      text: "Description & Reference"
- inputText: "Maestro CI E2E Test"

# --- Dismiss keyboard ---
- hideKeyboard

# --- Tap the non-interactive label to defocus the EditText ---
# After hideKeyboard the EditText retains UI focus. A focused EditText
# without the IME still consumes Maestro swipe gestures as cursor
# movement, blocking the parent ScrollView. Tapping the non-clickable
# label (android.widget.TextView, clickable=false) delivers the touch
# to the parent container, which clears EditText focus without affecting
# form state or triggering navigation. We do NOT collapse the accordion
# here — collapsing with tapOn "Visit Details" index:1 after typing was
# found to trigger the "unsaved data" dialog on back (possibly because
# accordion recomposition marks form state as dirty again).
- tapOn: "Description & Reference"

# --- Scroll to Save (accordion still expanded; generous timeout) ---
- scrollUntilVisible:
    element:
      text: "Save"
    direction: DOWN
    timeout: 25000
    speed: 40

# --- Tap Save ---
- tapOn: "Save"

# --- Scroll back UP to accordion header to allow async save to complete ---
# The app's save is async. extendedWaitUntil: visible: "Save" passes
# instantly (button is always visible), so pressing back 1.5s after Save
# interrupts the in-flight API call → unsaved-data dialog appears → data
# lost. Scrolling UP to "Visit Details" buys 3-5 seconds for the save to
# commit and also confirms we are still on the visit detail form.
- scrollUntilVisible:
    element:
      text: "Visit Details"
    direction: UP
    timeout: 10000
    speed: 40

# --- Navigate back to Visits Home ---
- back
- tapOn:
    text: "Go back"
    optional: true

# --- Verify back on Visits Home ---
- extendedWaitUntil:
    visible: ".*overview of your visits.*"
    timeout: 15000

# --- Re-open same visit ---
- scrollUntilVisible:
    element:
      text: "View Visit Details"
    direction: DOWN
    timeout: 20000
- tapOn: "View Visit Details"
- extendedWaitUntil:
    visible: "Inspections.*"
    timeout: 15000

# --- Tap Visit Details tab and expand accordion again ---
- tapOn: "Visit Details"
- tapOn:
    text: "Visit Details"
    index: 1

# --- Verify data persisted (scroll to description area) ---
- scrollUntilVisible:
    element:
      text: "Maestro CI E2E Test"
    direction: DOWN
    timeout: 15000
