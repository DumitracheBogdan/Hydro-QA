appId: com.hydrocert.app
name: "MOB38 V2 - E2E save and data persistence"
tags:
  - e2e
  - save
  - critical
---

# Opens a visit, edits a text field, saves, navigates back,
# re-opens the visit, and verifies the data persisted.
#
# Uses Visits Home visit (QA test) for persistence check.

- runFlow: _shared/open_qa_test_visit.yaml

# --- Ensure on the Visit Details tab, then expand the accordion ---
# The accordion header shares the tab's "Visit Details" label; the
# shared macro scrolls the tab off first so the tap hits the accordion,
# and leaves Description & Reference on screen.
- assertVisible: "Purchase Ord.*"
- runFlow: _shared/expand_visit_details_accordion.yaml

# --- Edit Description & Reference field ---
# Do NOT tap the label text "Description & Reference" — on API 30 CI emulator,
# tapping a Compose OutlinedTextField label does NOT transfer focus to the EditText.
# Use below: to tap the EditText that sits directly below the label instead.
- tapOn:
    below:
      text: "Description & Reference"
- inputText: "Maestro CI E2E Test"

# --- Dismiss keyboard ---
- hideKeyboard

# --- Tap the non-interactive label to defocus the EditText ---
# After hideKeyboard the EditText retains UI focus. A focused EditText
# without the IME still consumes Maestro swipe gestures as cursor
# movement, blocking the parent ScrollView. Tapping the non-clickable
# label (android.widget.TextView, clickable=false) delivers the touch
# to the parent container, which clears EditText focus without affecting
# form state or triggering navigation. We do NOT collapse the accordion
# here — collapsing with tapOn "Visit Details" index:1 after typing was
# found to trigger the "unsaved data" dialog on back (possibly because
# accordion recomposition marks form state as dirty again).
- tapOn: "Description & Reference"

# --- Scroll to Submit (renamed from Save in 1.8.46) ---
- scrollUntilVisible:
    element:
      text: "Submit"
    direction: DOWN
    timeout: 25000
    speed: 40

# --- Tap Submit ---
- tapOn: "Submit"

# --- Scroll back UP to accordion header to allow async save to complete ---
# The app's save is async. extendedWaitUntil: visible: "Submit" passes
# instantly (button is always visible), so pressing back 1.5s after Submit
# interrupts the in-flight API call, the unsaved-data dialog appears and
# data is lost. Scrolling UP to "Visit Details" buys 3-5 seconds for the
# save to commit and also confirms we are still on the visit detail form.
- scrollUntilVisible:
    element:
      text: "Visit Details"
    direction: UP
    timeout: 10000
    speed: 40

# --- Navigate back ---
# Entry was via the QA-test anchor (History search), so `back` lands
# on the History list. If the async Submit above has not committed yet
# (or the accordion re-dirtied the form), the unsaved-data modal
# appears on back - "Submit now" commits the pending edit AND leaves,
# which is exactly what this persistence test wants.
- back
- tapOn:
    text: "Submit now"
    optional: true
- tapOn:
    text: "Go back"
    optional: true

# --- Verify we left the visit (back on a main tab screen) ---
# Bottom-nav "Activity" exists only on the tab screens, not the visit
# detail, so it confirms we navigated out.
- extendedWaitUntil:
    visible: "Activity"
    timeout: 15000

# --- Re-open the SAME visit ---
# The History search stays filtered to "QA test" across the back
# navigation, so the QA test card is still the only result - its CTA
# is unambiguous. (Re-typing the query here was found to briefly show
# "No visits found" and race the scroll.) The card's CTA sits below
# the fold on the 320px CI screen, so scroll to it.
- scrollUntilVisible:
    element:
      text: "View Visit Details"
    direction: DOWN
    timeout: 20000
- tapOn: "View Visit Details"
- extendedWaitUntil:
    visible: "Inspections.*"
    timeout: 15000

# --- Expand the Visit Details accordion again to reveal the field ---
- assertVisible: "Purchase Ord.*"
- runFlow: _shared/expand_visit_details_accordion.yaml

# --- Verify data persisted ---
# This is a REAL backend visit — the Description field accumulates text
# across CI runs (clearState only clears local cache, not server data).
# Use ".*Maestro CI E2E Test.*" so the regex matches even if earlier runs'
# text appears as a prefix (Maestro uses full-string regex match).
- scrollUntilVisible:
    element:
      text: ".*Maestro CI E2E Test.*"
    direction: DOWN
    timeout: 15000
