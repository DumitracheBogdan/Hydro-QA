appId: com.hydrocert.app
name: "MOB05 V2 - Date filter chips"
tags:
  - visits
  - filters
  - smoke
---

# Taps every date filter chip. Today and Tomorrow are empty for
# the fixture user (text "No visits found"), Next week shows the
# seeded "QA test" visit card.

- runFlow: _shared/login.yaml

# --- Today ---
# Use extendedWaitUntil (not assertVisible) — the list needs time to filter.
- tapOn:
    text: "Today"
- extendedWaitUntil:
    visible: "(No visits found.*|QA test)"
    timeout: 8000

# --- Tomorrow ---
- tapOn:
    text: "Tomorrow"
- extendedWaitUntil:
    visible: "(No visits found.*|QA test)"
    timeout: 8000

# --- Next week ---
# The QA test visit (April 15) falls in the current calendar week, so
# "Next week" (April 20+) shows a DIFFERENT visit on the CI emulator
# (not the QA test visit). The visit card shows an "Upcoming" badge and
# a "View Visit Details" button — NOT the text "QA test" (which is the
# visit name, only visible inside the detail screen, not on the card).
- tapOn:
    text: "Next week"
- extendedWaitUntil:
    visible: "(No visits found.*|Upcoming|View Visit Details)"
    timeout: 10000

# --- All chips still present ---
- assertVisible: "Today"
- assertVisible: "Tomorrow"
- assertVisible: "Next week"
