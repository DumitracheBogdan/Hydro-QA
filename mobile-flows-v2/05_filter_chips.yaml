appId: com.hydrocert.app
name: "MOB05 V2 - Date filter chips"
tags:
  - visits
  - filters
  - smoke
---

# Taps every date filter chip and asserts the app stays on the Visits
# screen with a valid result under each chip. The QA account's seed
# visits are historical, so each chip legitimately resolves to either
# visit cards or the "No visits found" empty state - the flow accepts
# either; it does not require a specific card under a specific chip.

# CIRCLE: Today, Tomorrow, This week, Next week
- runFlow: _shared/login.yaml

# --- Today ---
# Use extendedWaitUntil (not assertVisible) — the list needs time to filter.
- tapOn:
    text: "Today"
- extendedWaitUntil:
    visible: "(No visits found.*|QA test)"
    timeout: 8000

# --- Tomorrow ---
- tapOn:
    text: "Tomorrow"
- extendedWaitUntil:
    visible: "(No visits found.*|QA test)"
    timeout: 8000

# --- This week (added in app 1.8.x) ---
- tapOn:
    text: "This week"
- extendedWaitUntil:
    visible: "(No visits found.*|Upcoming|View Visit Details)"
    timeout: 10000

# --- Next week ---
# The chips row is a horizontal carousel; "Next week" sits off-screen
# on the 320px CI display since "This week" was added, so swipe the
# row (y = 29% of the screen) before tapping. All seed visits for the
# QA account are historical by now, so each chip legitimately
# resolves to either visit cards or the empty state.
- swipe:
    start: "85%, 29%"
    end: "15%, 29%"
- tapOn:
    text: "Next week"
- extendedWaitUntil:
    visible: "(No visits found.*|Upcoming|View Visit Details)"
    timeout: 10000

# --- Chips row still rendered after the carousel swipe ---
# ("Today" scrolled off-screen left, so assert on what is in view.)
- assertVisible: "Next week"
- assertVisible: "Visits"
