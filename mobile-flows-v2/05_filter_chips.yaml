appId: com.hydrocert.app
name: "MOB05 V2 - Date filter chips"
tags:
  - visits
  - filters
  - smoke
---

# Taps every date filter chip. Today and Tomorrow are empty for
# the fixture user (text "No visits found"), Next week shows the
# seeded "QA test" visit card.

- runFlow: _shared/login.yaml

# --- Today ---
# Use extendedWaitUntil (not assertVisible) — the list needs time to filter.
- tapOn:
    text: "Today"
- extendedWaitUntil:
    visible: "(No visits found.*|QA test)"
    timeout: 8000

# --- Tomorrow ---
- tapOn:
    text: "Tomorrow"
- extendedWaitUntil:
    visible: "(No visits found.*|QA test)"
    timeout: 8000

# --- Next week ---
# Longer timeout — "Next week" filter may need more time to load results
# than Today/Tomorrow. The QA test visit (April 15) may or may not fall
# into "next week" depending on the CI emulator's calendar week definition.
- tapOn:
    text: "Next week"
- extendedWaitUntil:
    visible: "(No visits found.*|QA test)"
    timeout: 20000

# --- All chips still present ---
- assertVisible: "Today"
- assertVisible: "Tomorrow"
- assertVisible: "Next week"
