appId: com.hydrocert.app
name: "MOB08 V2 - History tab elements"
tags:
  - history
  - smoke
---

# Source of truth: discovery/hierarchies/10-history-tab.xml
# The History tab shows a visit card with a proper "View Visit
# Details" CTA button at bounds [32,516][288,556] that is the
# only clickable card target in the whole app (Visits Home cards
# are not clickable).

- runFlow: _shared/login.yaml

# --- Navigate to History ---
- tapOn:
    text: "History"
- extendedWaitUntil:
    visible: "View Visit Details"
    timeout: 15000

# --- Header / search ---
- assertVisible: "History"
- assertVisible:
    text: "Type to search.*"

# --- Visit card structural contents ---
# Avoid hardcoded dynamic visit titles (volatile seed data).
# Assert only structural elements that exist for any History visit
# card. Two fixes learned from false positives:
#   - the status badge is time-dependent ("Upcoming" becomes
#     "Overdue" once the visit date passes), so accept any badge
#   - "Booking Person" is no longer rendered on the card in 1.8.x
#     (it moved inside the visit detail header), so don't assert it
- assertVisible: "(Upcoming|Overdue|In progress|Completed)"
- assertVisible:
    text: "INSPECTIONS.*"
- assertVisible: "View Visit Details"

# --- Bottom navigation still visible ---
- assertVisible: "Visits"
- assertVisible: "Activity"
- assertVisible: "Account"
