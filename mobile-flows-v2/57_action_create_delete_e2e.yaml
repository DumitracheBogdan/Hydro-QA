appId: com.hydrocert.app
name: "MOB57 V2 - Custom action create and delete e2e"
tags:
  - visit-detail
  - actions
  - e2e
  - regression
---

# Full lifecycle of a custom action on the QA test visit:
#   1. FAB (Quick actions) then "Actions" opens the Add Actions sheet
#   2. "Add Custom Action" inline widget, type a fixed string, "Add"
#   3. Sheet "Save" lands the action in the Actions area
#   4. Delete it via ITS trash icon (below: the action text), confirm
#   5. Assert it is gone - net state change is zero either way
#      (whether the sheet Save persists to server or only dirties the
#      local form, add followed by delete cancels out).
# Fixed string keeps the flow idempotent; a best-effort pre-clean
# removes a leftover from a crashed earlier run so the delete step
# never faces two identical rows.

- runFlow: _shared/open_qa_test_visit.yaml

# --- Scroll to the Actions area (seed action's trash marks it) ---
# The QA test visit always holds one seed action with a "Delete
# action" trash icon, so it is a reliable landmark for the section.
- scrollUntilVisible:
    element:
      text: "Delete action"
    direction: DOWN
    timeout: 15000

# --- Best-effort pre-clean: remove a leftover from a crashed run ---
# Only fires when "QA nightly action" survived a previous failed run;
# normally this whole block is skipped.
- runFlow:
    when:
      visible: "QA nightly action"
    commands:
      - tapOn:
          text: "Delete action"
          below:
            text: "QA nightly action"
      - extendedWaitUntil:
          visible: "^Delete$"
          timeout: 10000
      - tapOn: "^Delete$"
      - extendedWaitUntil:
          notVisible: "QA nightly action"
          timeout: 10000

# --- Open the FAB and the Add Actions sheet ---
- tapOn:
    text: "Quick actions"
- extendedWaitUntil:
    visible: "Camera"
    timeout: 10000
# below: gallery distinguishes the FAB sub-button from the "Actions"
# accordion header that may also be on screen (same trick as MOB17)
- tapOn:
    text: "Actions"
    below:
      text: "gallery"
- extendedWaitUntil:
    visible: "Add Custom Action"
    timeout: 10000

# --- Open the inline custom-action widget and type the text ---
# The widget's confirm button is "Add" since the 1.8.46 rename
# (exact match - a loose "Add.*" would hit "Add Custom Action").
- tapOn: "Add Custom Action"
- extendedWaitUntil:
    visible: "^Add$"
    timeout: 10000
# The widget's input sits directly under the "Add Custom Action" row.
# Compose hints are not findable on API 30, so anchor with below:
# rather than the placeholder text.
- tapOn:
    below:
      text: "Add Custom Action"
- inputText: "QA nightly action"
- hideKeyboard
- tapOn: "^Add$"

# --- The new action shows in the sheet's checklist, then Save ---
- extendedWaitUntil:
    visible: "QA nightly action"
    timeout: 10000
- tapOn: "^Save$"
- extendedWaitUntil:
    notVisible: "Add Custom Action"
    timeout: 10000

# --- Back on Visit Detail: the action is in the Actions area ---
- extendedWaitUntil:
    visible: "Inspections.*"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: "QA nightly action"
    direction: DOWN
    timeout: 15000

# --- Delete it via ITS trash icon ---
# below: the action text picks the trash icon that belongs to this
# row (each action row draws its badge + trash UNDER its text; the
# seed action's trash sits above ours, so it does not match below:).
- tapOn:
    text: "Delete action"
    below:
      text: "QA nightly action"
- extendedWaitUntil:
    visible: "^Delete$"
    timeout: 10000
- tapOn: "^Delete$"

# --- Confirm it is gone ---
- extendedWaitUntil:
    notVisible: "QA nightly action"
    timeout: 10000
# The seed action's trash must still be there - proves we deleted
# ours and not the seed fixture
- assertVisible: "Delete action"

# --- Leave. Net change is zero; if the form still counts as dirty,
# discard via the unsaved dialog (either wording variant). ---
- back
- tapOn:
    text: "Go back"
    optional: true
- extendedWaitUntil:
    visible: "Activity"
    timeout: 15000
