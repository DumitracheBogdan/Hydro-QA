appId: com.hydrocert.app
name: "MOB12 V2 - Change Password screen"
tags:
  - account
  - change-password
  - smoke
---

# Taps Change Password on the Account screen and verifies the
# form loads. We then intentionally tap "Back" (either in-app
# Back button or system back) to return to Account.
#
# We do NOT know the exact labels on the Change Password screen
# yet (discovery flow v2 got stuck before this screen was reached)
# so we assert on a permissive set of markers first and the run
# log will tell us what to tighten.

- runFlow: _shared/login.yaml

# --- Navigate to Account ---
- tapOn:
    text: "Account"
- extendedWaitUntil:
    visible: "Change Password"
    timeout: 15000

# --- Open Change Password ---
- tapOn:
    text: "Change Password"

# --- Expect at least one password field label ---
- extendedWaitUntil:
    visible:
      text: "(Current Password|New Password|Old Password|Password)"
    timeout: 15000
- assertVisible:
    text: "(Current Password|New Password|Old Password|Password)"

# --- Navigate back to Account via Android back ---
- back
- extendedWaitUntil:
    visible: "My signature"
    timeout: 15000
- assertVisible: "My signature"
- assertVisible: "Change Password"
- assertVisible: "Logout"
