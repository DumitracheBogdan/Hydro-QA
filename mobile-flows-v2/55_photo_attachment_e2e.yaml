appId: com.hydrocert.app
name: "MOB55 V2 - Photo attachment e2e (gallery pick, label, upload, delete)"
tags:
  - visit-detail
  - attachments
  - gallery
  - e2e
  - regression
---

# End-to-end attachment lifecycle on the QA test seed visit:
#   1. Attachments tab starts empty (count 0, the seed visit is kept
#      attachment-free; flow 19 depends on that too)
#   2. FAB then gallery, pick the runner-seeded image from the picker
#   3. Fill the "Photo label" dialog and Save. The upload hits the
#      network but is NOT a lab submission, so it is allowed.
#   4. Assert the count goes from 0 to 1
#   5. Delete the attachment and assert the tab is empty again, so the
#      seed visit is left exactly as found
#
# PRECONDITION (runner): one image must be seeded in the emulator
# gallery and media-scanned, e.g. /sdcard/Pictures/qa_seed.jpg. The
# picker conditionals below try the Google photo picker item desc
# first ("Photo taken ...") and the file name second.
# Source: exploration docs/12_CAMERA_GALLERY.md + 06_ATTACHMENTS_TAB.md

- runFlow: _shared/open_qa_test_visit.yaml

# --- Go to the Attachments tab and check the clean starting state ---
- tapOn:
    text: "Attachments.*"
- extendedWaitUntil:
    visible: "No attachments.*"
    timeout: 15000
- assertVisible: 'Attachments \(0\)'

# --- FAB then gallery ---
- tapOn:
    text: "Quick actions"
- extendedWaitUntil:
    visible: "Camera"
    timeout: 10000
- tapOn: "gallery"

# --- Wait for the system picker (photo picker or DocumentsUI) ---
- extendedWaitUntil:
    visible: "(Photos|Albums|Images|Recent|Gallery|Documents|Open from).*"
    timeout: 15000

# --- Pick the seeded image. Three attempts, first match wins. ---
# Google photo picker items carry a "Photo taken ..." content-desc
- runFlow:
    when:
      visible:
        text: "Photo taken.*"
    commands:
      - tapOn:
          text: "Photo taken.*"
          index: 0
# DocumentsUI shows the file name on or under the thumbnail
- runFlow:
    when:
      visible:
        text: ".*qa_seed.*"
    commands:
      - tapOn:
          text: ".*qa_seed.*"
          index: 0
# Last resort: tap where the first grid item sits. Guarded so it only
# fires when the label dialog has not appeared yet (meaning neither
# text tap above landed).
- runFlow:
    when:
      notVisible: "Photo label.*"
    commands:
      - tapOn:
          point: "25%, 35%"

# --- Photo label dialog (title "Photo label", hint "e.g. Before
# cleaning", Cancel and Save buttons) ---
- extendedWaitUntil:
    visible: "Photo label.*"
    timeout: 15000
# Compose hints vanish once the field has text, so the hint tap is
# guarded; the dialog usually auto-focuses the field anyway
- runFlow:
    when:
      visible:
        text: "e.g. Before.*"
    commands:
      - tapOn: "e.g. Before.*"
- inputText: "QA nightly photo"
- hideKeyboard
- tapOn: "^Save$"

# --- Upload goes over the network; give it a generous window ---
- extendedWaitUntil:
    visible: 'Attachments \(1\)'
    timeout: 60000
- assertNotVisible: "No attachments.*"

# --- Delete the attachment we just added ---
# Preferred: a dedicated delete icon (mirrors the "Delete action" desc
# on the Actions card). Fallbacks: long-press the card by its label,
# then a plain tap in case a viewer screen holds the delete control.
- runFlow:
    when:
      visible:
        text: "Delete attachment"
    commands:
      - tapOn: "Delete attachment"
- runFlow:
    when:
      notVisible: "^Delete$"
    commands:
      - longPressOn: "QA nightly photo"
- runFlow:
    when:
      notVisible: "^Delete$"
    commands:
      - tapOn: "QA nightly photo"

# --- Confirm the delete dialog ---
- extendedWaitUntil:
    visible: "^Delete$"
    timeout: 10000
- tapOn: "^Delete$"
# Some builds show a second confirm step; clear it if it shows up
- runFlow:
    when:
      visible:
        text: "^(Delete|Confirm)$"
    commands:
      - tapOn: "^(Delete|Confirm)$"

# --- Back to the clean starting state (seed visit left as found) ---
- extendedWaitUntil:
    visible: "No attachments.*"
    timeout: 30000
- assertVisible: 'Attachments \(0\)'

# --- Navigate back; discard if the app flags unsaved data ---
- back
- runFlow:
    when:
      visible:
        text: "Unsaved data"
    commands:
      - tapOn: "Go back"
