appId: com.hydrocert.app
name: "MOB32 V2 - Inspection Type 3 Calorifier form"
tags:
  - inspections
  - regression
---

# Opens the Calorifier/Water Heater form (Type 3) and
# verifies the form structure.

# CIRCLE: Notes, Submit
- runFlow: _shared/open_qa_test_visit.yaml

# --- Switch to Inspections tab ---
- tapOn:
    text: "Inspections.*"
- extendedWaitUntil:
    visible: "Inspections.*"
    timeout: 10000
- extendedWaitUntil:
    visible: "Start Inspection"
    timeout: 10000

# --- Scroll to this card's Start Inspection button ---
# Scroll until the Start Inspection that sits BELOW this card's
# title is on screen (not just the title) - on the 320x640 CI
# screen the title can land at the fold with its button off-screen,
# which made a plain "tapOn below" miss.
- scrollUntilVisible:
    element:
      text: "Start Inspection"
      below:
        text: ".*Calorifier.*"
    direction: DOWN
    timeout: 15000

# --- Tap Start Inspection for this specific card ---
- tapOn:
    text: "Start Inspection"
    below:
      text: ".*Calorifier.*"

# --- Verify form opened ---
- extendedWaitUntil:
    visible: "(Submit|Information|Unable)"
    timeout: 15000
