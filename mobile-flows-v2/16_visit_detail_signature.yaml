appId: com.hydrocert.app
name: "MOB16 V2 - Client Signature dialog"
tags:
  - visit-detail
  - signature
  - smoke
---

# Opens a visit, expands Client Signature accordion, taps to
# open the signature dialog, verifies the Clear and Add buttons
# (1.8.47 renamed the confirm button from "Submit" to "Add"), then
# closes without submitting.
# Source: exploration docs/04_VISIT_DETAIL.md (Signature Dialog)
# UI dump: ui-dumps/12_client_signature_expanded.xml
#
# After expansion, the hierarchy shows:
#   text="Client name"        (label)
#   text="Enter"              (EditText placeholder)
#   content-desc="Tap to sign" + text="Tap to sign!" (canvas area)

- runFlow: _shared/open_qa_test_visit.yaml

# --- Scroll to the Client Signature accordion ---
# On 320px CI screens the 1.8.x Description card pushes the accordion
# below the fold, so scroll to it before tapping.
- scrollUntilVisible:
    element:
      text: "Client Signature"
    direction: DOWN
    timeout: 15000
- tapOn:
    text: "Client Signature"

# --- Scroll down to find expanded content ---
# The expansion pushes content below the viewport. "Client name"
# label appears just below the accordion header.
- scrollUntilVisible:
    element:
      text: "Client name"
    direction: DOWN
    timeout: 15000
- assertVisible: "Client name"

# --- Scroll further to find the signature canvas ---
- scrollUntilVisible:
    element:
      text: "Tap to sign.*"
    direction: DOWN
    timeout: 15000

# --- Tap to open signature dialog ---
- tapOn:
    text: "Tap to sign.*"

# --- Verify signature dialog has correct buttons ---
# 1.8.47 renamed the confirm button from "Submit" to "Add".
- extendedWaitUntil:
    visible: "Clear"
    timeout: 10000
- assertVisible: "Clear"
- assertVisible: "Add"

# --- Close dialog without submitting (system back) ---
- back

# --- Verify dialog was closed and we're back on visit detail ---
# The view is scrolled far down from earlier scrollUntilVisible,
# so scroll UP to find the accordion header as confirmation
- scrollUntilVisible:
    element:
      text: "Client Signature"
    direction: UP
    timeout: 10000

# --- Navigate back ---
- back
