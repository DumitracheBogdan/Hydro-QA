appId: com.hydrocert.app
name: "MOB24 V2 - Login negative (wrong credentials)"
tags:
  - login
  - negative
  - regression
---

# Tests wrong credentials show error message and
# verifies show/hide password toggle.

- launchApp:
    clearState: true

# "Welcome back!" (top-anchored) as the paint signal, then wait for
# the logo to settle before tapping it.
- extendedWaitUntil:
    visible:
      text: "Welcome back.*"
    timeout: 45000
- extendedWaitUntil:
    visible: "Hydrocert Logo"
    timeout: 10000

# Point the app at DEV (see _shared/login.yaml for the why); the
# "Invalid Credentials" assert below comes from the backend, so this
# flow must talk to the environment under test.
- tapOn:
    text: "Hydrocert Logo"
    repeat: 3
    delay: 250
- extendedWaitUntil:
    visible: "Select Environment"
    timeout: 10000
- tapOn:
    leftOf:
      text: "^Development$"
- tapOn: "^Apply$"
- extendedWaitUntil:
    notVisible: "Select Environment"
    timeout: 10000

# --- Test: Wrong credentials ---
- tapOn:
    text: "^Email$"
- inputText: "wrong@email.com"
- hideKeyboard

- tapOn:
    text: "^Password$"
- inputText: "WrongPassword1!"
- hideKeyboard

- tapOn:
    text: "^Login$"

# --- Verify error message ---
- extendedWaitUntil:
    visible: "Invalid Credentials"
    timeout: 10000

# --- Test: Show/Hide password toggle ---
- tapOn:
    id: "Show password"
    optional: true
- tapOn:
    id: "Hide password"
    optional: true
