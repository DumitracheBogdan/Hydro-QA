appId: com.hydrocert.app
name: "MOB18 V2 - Inspections tab content"
tags:
  - visit-detail
  - inspections
  - smoke
---

# Opens the QA test visit and switches to the Inspections tab.
# It verifies:
# 1. The Inspections tab can be switched to
# 2. The tab content differs from Visit Details content
# 3. The FAB is still accessible on the Inspections tab

# CIRCLE: Start Inspection
- runFlow: _shared/open_qa_test_visit.yaml

# --- Verify on Visit Details tab (default) ---
# "Purchase Ord." is a top-anchored, Visit-Details-only element.
# (Client Signature also identifies the tab but sits below the fold
# on the 320px CI screen since the 1.8.x Description card.)
- assertVisible: "Purchase Ord.*"

# --- Switch to Inspections tab ---
- tapOn:
    text: "Inspections.*"

# --- Give tab content time to render (QA test visit has 4 forms) ---
- extendedWaitUntil:
    visible: "Start Inspection"
    timeout: 10000

# --- Verify Visit Details tab content is no longer shown ---
- assertNotVisible: "Purchase Ord.*"

# --- FAB should still be accessible on Inspections tab ---
- assertVisible: "Quick actions"

# --- Verify the tab row is still navigable ---
- assertVisible: "Visit Details"
- assertVisible: "Attachments.*"

# --- Navigate back ---
- back
