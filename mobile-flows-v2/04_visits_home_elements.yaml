appId: com.hydrocert.app
name: "MOB04 V2 - Visits Home screen elements"
tags:
  - visits
  - home
  - smoke
---

# Asserts every visible element on the Visits Home screen.
# Source of truth: discovery/hierarchies/04-visits-home-default.xml

- runFlow: _shared/login.yaml

# --- Header ---
- assertVisible: ".*Welcome, Bogdan.*"
- assertVisible: ".*overview of your visits.*"
- assertVisible: "BD"

# --- Search bar ---
- assertVisible:
    text: "Type to search.*"

# --- Filter chips ---
- assertVisible: "Today"
- assertVisible: "Tomorrow"
- assertVisible: "Next week"

# --- Filter state chip ---
# "Upcoming" is the default filter group label shown on Visits Home.
# Visit card contents (time, Booking Person, INSPECTIONS) are NOT asserted
# here — in the CI emulator seed Visits Home can be empty of cards
# (seeded visit is historical). Those assertions belong in the History flow.
- assertVisible: "Upcoming"

# --- Bottom navigation tabs ---
- assertVisible: "Visits"
- assertVisible: "History"
- assertVisible: "Activity"
- assertVisible: "Account"
