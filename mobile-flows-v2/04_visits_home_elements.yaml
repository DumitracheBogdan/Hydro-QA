appId: com.hydrocert.app
name: "MOB04 V2 - Visits Home screen elements"
tags:
  - visits
  - home
  - smoke
---

# Asserts every visible element on the Visits Home screen.
# Source of truth: discovery/hierarchies/04-visits-home-default.xml

- runFlow: _shared/login.yaml

# --- Header ---
- assertVisible: ".*Welcome, Bogdan.*"
- assertVisible: ".*overview of your visits.*"
- assertVisible: "BD"

# --- Search bar ---
- assertVisible:
    text: "Type to search.*"

# --- Filter chips ---
- assertVisible: "Today"
- assertVisible: "Tomorrow"
- assertVisible: "Next week"

# --- Visit card structural contents ---
# Avoid hardcoded dynamic visit titles (volatile seed data)
# Assert the time-window separator "HH:MM -> HH:MM" that every
# visit card renders, and the INSPECTIONS(N) label. These are
# structural to the card, independent of which visit is seeded.
- assertVisible:
    text: ".*[0-9]{2}:[0-9]{2}.*->.*[0-9]{2}:[0-9]{2}.*"
- assertVisible: "Upcoming"
- assertVisible: "Booking Person"
- assertVisible:
    text: "INSPECTIONS.*"

# --- Bottom navigation tabs ---
- assertVisible: "Visits"
- assertVisible: "History"
- assertVisible: "Activity"
- assertVisible: "Account"
