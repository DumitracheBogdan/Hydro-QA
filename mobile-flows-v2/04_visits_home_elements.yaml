appId: com.hydrocert.app
name: "MOB04 V2 - Visits Home screen elements"
tags:
  - visits
  - home
  - smoke
---

# Asserts every visible element on the Visits Home screen.
# Source of truth: discovery/hierarchies/04-visits-home-default.xml

# CIRCLE: Next week
- runFlow: _shared/login.yaml

# --- Header ---
- assertVisible: ".*Welcome, Bogdan.*"
- assertVisible: ".*overview of your visits.*"
- assertVisible: "BD"

# --- Search bar ---
- assertVisible:
    text: "Type to search.*"

# --- Filter chips ---
# "This week" chip was added in app 1.8.x
- assertVisible: "Today"
- assertVisible: "Tomorrow"
- assertVisible: "This week"

# The chips row is a horizontal carousel. With the extra "This week"
# chip, "Next week" no longer fits on the 320px CI screen, so swipe
# the row (y = 29% of the screen) before asserting it.
- swipe:
    start: "85%, 29%"
    end: "15%, 29%"
- assertVisible: "Next week"

# --- List state ---
# The home list has exactly two legitimate states for the QA account:
# upcoming visit cards (label/badge "Upcoming") or the explicit empty
# state "No visits found". Asserting only "Upcoming" was a false
# positive generator - the seed visits are all historical, so once
# their dates passed the label disappeared and the flow failed with
# the app perfectly healthy.
- assertVisible: "(Upcoming|No visits found.*)"

# --- Bottom navigation tabs ---
- assertVisible: "Visits"
- assertVisible: "History"
- assertVisible: "Activity"
- assertVisible: "Account"
