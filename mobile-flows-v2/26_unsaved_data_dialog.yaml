appId: com.hydrocert.app
name: "MOB26 V2 - Visit Detail accordion and form fields"
tags:
  - visit-detail
  - accordion
  - form-fields
  - regression
---

# Opens a visit, expands the Visit Details accordion, verifies
# the form fields are visible, then navigates back.
#
# Navigates via History tab (reliable) -> Visit Detail.

- runFlow: _shared/navigate_to_visit_detail.yaml

# --- Expand Visit Details accordion ---
- tapOn: "Visit Details"
- tapOn:
    text: "Visit Details"
    index: 1

# --- Verify Description field ---
# Use the concrete field label (not the EditText hint — hint child nodes are
# not findable text nodes on the API 30 CI emulator).
- scrollUntilVisible:
    element:
      text: "Description & Reference"
    direction: DOWN
    timeout: 15000

# --- Verify Work Details field ---
# Same reasoning — use the concrete "Work Details" label, not the hint text.
- scrollUntilVisible:
    element:
      text: "Work Details"
    direction: DOWN
    timeout: 10000

# --- Navigate back ---
# Entry was via History tab -> Visit Detail, so `back` lands on History.
- back

# --- Verify returned to the History visit list ---
- extendedWaitUntil:
    visible: "View Visit Details"
    timeout: 15000
