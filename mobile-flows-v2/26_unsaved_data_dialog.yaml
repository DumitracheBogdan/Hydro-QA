appId: com.hydrocert.app
name: "MOB26 V2 - Unsaved data dialog (Stay / Go back)"
tags:
  - visit-detail
  - unsaved-data
  - dialog
  - critical
---

# Makes a text change on Visit Detail, presses Back to trigger
# the unsaved data dialog. Tests both "Stay" and "Go back".
# Uses QA test visit (Visits Home) which has editable Description.

- runFlow: _shared/open_visits_home_visit.yaml

# --- Navigate to Visit Details tab (accordion auto-expanded) ---
- tapOn: "Visit Details"

# --- Scroll to and type into description field (triggers dirty state) ---
- scrollUntilVisible:
    element:
      text: "Enter description.*|Description & Reference"
    direction: DOWN
    timeout: 15000
- tapOn: "Enter description.*|Description & Reference"
- inputText: "unsaved"
- hideKeyboard

# --- Press Back to trigger Unsaved Data dialog ---
- back

# --- Verify Unsaved Data dialog appears ---
- extendedWaitUntil:
    visible: ".*[Uu]nsaved.*|.*[Dd]iscard.*|Stay"
    timeout: 10000

# --- Test "Stay" button (stay on page) ---
- tapOn: "Stay"

# --- Verify we're still on Visit Detail ---
- extendedWaitUntil:
    visible: "Inspections.*"
    timeout: 10000

# --- Press Back again to trigger dialog ---
- back

# --- Verify dialog appears again ---
- extendedWaitUntil:
    visible: ".*[Uu]nsaved.*|.*[Dd]iscard.*|Stay"
    timeout: 10000

# --- Test "Go back" button (discard and leave) ---
- tapOn: "Go back"

# --- Verify we're back on Visits Home ---
- extendedWaitUntil:
    visible: ".*overview of your visits.*"
    timeout: 15000
