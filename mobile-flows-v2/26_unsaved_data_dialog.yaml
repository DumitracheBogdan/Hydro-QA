appId: com.hydrocert.app
name: "MOB26 V2 - Visit Detail edit and back navigation"
tags:
  - visit-detail
  - navigation
  - regression
---

# Verifies that editing a Visit Detail field works and that
# back navigation returns to Visits Home cleanly.
# Tests description field editing and accordion expansion.

- runFlow: _shared/open_visits_home_visit.yaml

# --- Navigate to Visit Details tab and expand accordion ---
- tapOn: "Visit Details"
- tapOn:
    text: "Visit Details"
    index: 1

# --- Scroll to and verify description field ---
- scrollUntilVisible:
    element:
      text: "Enter description.*|Description"
    direction: DOWN
    timeout: 15000

# --- Tap and type into description field ---
- tapOn: "Enter description.*|Description"
- inputText: "test edit"
- hideKeyboard

# --- Navigate back (handle optional unsaved data dialog) ---
- back
- tapOn:
    text: "Go back"
    optional: true

# --- Verify we're back on Visits Home ---
- extendedWaitUntil:
    visible: ".*overview of your visits.*"
    timeout: 15000
