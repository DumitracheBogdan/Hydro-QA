appId: com.hydrocert.app
name: "MOB37 V2 - History cards open Visit Detail (edit mode)"
tags:
  - history
  - navigation
  - regression
---

# Opens a visit from History tab and verifies it opens in
# full edit mode (all tabs, FAB, fields accessible).

- runFlow: _shared/open_visit_detail.yaml

# --- Verify Visit Detail opened with all tabs ---
- assertVisible: "Visit Details"
- assertVisible: "Inspections.*"
- assertVisible: "Attachments.*"

# --- Verify FAB is accessible (edit mode) ---
- assertVisible: "Quick actions"

# --- Verify Client Signature accordion (Visit Details tab) ---
# Below the fold on the 320px CI screen since 1.8.x, so scroll to it.
- scrollUntilVisible:
    element:
      text: "Client Signature"
    direction: DOWN
    timeout: 15000
- assertVisible: "Client Signature"

# --- Navigate back ---
- back
