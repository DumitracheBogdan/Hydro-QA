appId: com.hydrocert.app
name: "MOB30 V2 - Unable to Inspect toggle and Submit"
tags:
  - inspections
  - missing-inspection
  - toggle
---

# Opens the first inspection form, scrolls to the Unable to
# Inspect toggle (renamed from Missing inspection in 1.8.46),
# verifies it can be switched ON/OFF,
# and that the Submit button (renamed from Save) is visible.

- runFlow: _shared/open_qa_test_visit.yaml

# --- Switch to Inspections tab ---
- tapOn:
    text: "Inspections.*"
- extendedWaitUntil:
    visible: "Start Inspection"
    timeout: 10000

# --- Start first inspection ---
- tapOn:
    text: "Start Inspection"
    index: 0

# --- Scroll to Unable to Inspect toggle ---
- scrollUntilVisible:
    element:
      text: "Unable to Inspect"
    direction: DOWN
    timeout: 10000

# --- Verify Submit button (may need scroll) ---
- scrollUntilVisible:
    element:
      text: "Submit"
    direction: DOWN
    timeout: 10000

# --- Toggle Unable to Inspect ON ---
- tapOn: "Unable to Inspect"

# --- Toggle back OFF (leaves the form in its original state) ---
- tapOn: "Unable to Inspect"

# --- Go back ---
- back
- back
