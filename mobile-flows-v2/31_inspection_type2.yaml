appId: com.hydrocert.app
name: "MOB31 V2 - Inspection Type 2 Cooling Tower form"
tags:
  - inspections
  - regression
---

# Opens the Cooling Tower Disinfection form (Type 2) and asserts the
# form screen renders (one of Submit / Information / Unable is shown).
# A smoke check that the inspection opens; it does not verify accordions.

- runFlow: _shared/open_qa_test_visit.yaml

# --- Switch to Inspections tab ---
- tapOn:
    text: "Inspections.*"
- extendedWaitUntil:
    visible: "Inspections.*"
    timeout: 10000
- extendedWaitUntil:
    visible: "Start Inspection"
    timeout: 10000

# --- Scroll to this card's Start Inspection button ---
# Scroll until the Start Inspection that sits BELOW this card's
# title is on screen (not just the title) - on the 320x640 CI
# screen the title can land at the fold with its button off-screen,
# which made a plain "tapOn below" miss.
- scrollUntilVisible:
    element:
      text: "Start Inspection"
      below:
        text: ".*Cooling Tower.*"
    direction: DOWN
    timeout: 15000

# --- Tap Start Inspection for this specific card ---
- tapOn:
    text: "Start Inspection"
    below:
      text: ".*Cooling Tower.*"

# --- Verify form opened (Submit or any form element; renamed in 1.8.46) ---
- extendedWaitUntil:
    visible: "(Submit|Information|Unable)"
    timeout: 15000

# --- Go back ---
- back
- back
