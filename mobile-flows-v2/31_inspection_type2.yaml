appId: com.hydrocert.app
name: "MOB31 V2 - Inspection Type 2 Cooling Tower form"
tags:
  - inspections
  - regression
---

# Opens the Cooling Tower Disinfection form (Type 2) and
# verifies the form structure with accordions.

- runFlow: _shared/open_visits_home_visit.yaml

# --- Switch to Inspections tab ---
- tapOn:
    text: "Inspections.*"
- extendedWaitUntil:
    visible: "Start Inspection"
    timeout: 10000

# --- Scroll to Cooling Tower card ---
- scrollUntilVisible:
    element:
      text: ".*Cooling Tower.*"
    direction: DOWN
    timeout: 10000

# --- Tap Start Inspection for this specific card ---
- tapOn:
    text: "Start Inspection"
    below:
      text: ".*Cooling Tower.*"

# --- Verify form opened (Save or any form element) ---
- extendedWaitUntil:
    visible: "(Save|Information|Missing)"
    timeout: 15000

# --- Go back ---
- back
- back
