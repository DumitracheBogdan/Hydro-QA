appId: com.hydrocert.app
name: "MOB47 V2 - Calorifier temps inspection fill (no sample submit)"
tags:
  - inspections
  - forms
  - regression
---

# Opens the Calorifier/Water Heater temperatures inspection on the QA test visit, fills the Notes
# field via its Edit dialog (the input whose selectors are proven on
# device; per-form accordion field labels are not reliable across
# 1.8.4x, so we fill Notes rather than guess), and - because this is a
# WATER-SAMPLE type - asserts the saved Notes plus the form's own
# Submit control WITHOUT ever submitting (the "Submit Samples" bar
# lives on the Inspections tab, not in the form; flow 42 checks it).
# HARD BAN: never tap Submit / Submit Samples on this sample-bearing form.

# CIRCLE: Notes, Submit
- runFlow: _shared/open_qa_test_visit.yaml

- tapOn:
    text: "Inspections.*"
- extendedWaitUntil:
    visible: "Start Inspection"
    timeout: 10000

# --- Open this inspection type via its own card ---
- scrollUntilVisible:
    element:
      text: "(Start Inspection|View Inspection)"
      below:
        text: ".*Calorifier.*"
    direction: DOWN
    timeout: 15000
- tapOn:
    text: "(Start Inspection|View Inspection)"
    below:
      text: ".*Calorifier.*"
- extendedWaitUntil:
    visible: "(Submit|Information|Unable|Notes)"
    timeout: 15000

# --- Fill Notes via its Edit dialog (idempotent) ---
- tapOn: "Edit"
- extendedWaitUntil:
    visible: "Save"
    timeout: 10000
- tapOn:
    below:
      text: "Notes"
- eraseText: 60
- inputText: "QA regression form check"
- hideKeyboard
- tapOn: "Save"

# --- WATER-SAMPLE TYPE: do NOT submit (Submit could push samples).
# Assert the Notes saved and the form's own Submit control is present
# (never tapped on this sample-bearing form), then leave. The
# "Submit Samples" bar lives on the visit's Inspections tab, not
# inside the form, so it is not asserted here (see flow 42/47's
# sibling checks for that bar).
- assertVisible: "QA regression form check"
- scrollUntilVisible:
    element:
      text: "^Submit$"
    direction: DOWN
    timeout: 20000
    speed: 40
- assertVisible: "^Submit$"
- back
- tapOn:
    text: "Not now"
    optional: true
