appId: com.hydrocert.app
name: "MOB36 V2 - Change Password validation rules"
tags:
  - account
  - validation
  - regression
---

# Navigates to Change Password screen and verifies the
# 3 validation rules, form fields, and Submit button.

- runFlow: _shared/login.yaml

# --- Navigate to Account tab ---
- tapOn:
    text: "Account"
- extendedWaitUntil:
    visible: "Change Password"
    timeout: 10000

# --- Tap Change Password ---
- tapOn: "Change Password"

# --- Verify validation rules ---
- extendedWaitUntil:
    visible: ".*8 characters.*"
    timeout: 10000
- assertVisible: ".*upper case.*lower case.*"
- assertVisible: ".*number.*special character.*"

# --- Verify form fields ---
- assertVisible: "Current Password"
- assertVisible: "New Password"
- assertVisible: "Confirm Password"
- assertVisible: "Submit"

# --- Navigate back ---
- back
