appId: com.hydrocert.app
name: "MOB20 V2 - BD avatar navigates to Account"
tags:
  - visits-home
  - navigation
  - account
  - smoke
---

# Verifies the BD profile avatar on Visits Home navigates
# directly to the Account tab. "BD" = user initials (Bogdan
# Dumitrache). The avatar is at the top of the header area.

- runFlow: _shared/login.yaml

# --- Verify BD avatar is visible on Visits Home ---
- assertVisible: "BD"

# --- Tap BD avatar (first match = header avatar) ---
- tapOn: "BD"

# --- Verify Account tab opened ---
- extendedWaitUntil:
    visible: "My signature"
    timeout: 10000
- assertVisible: "Account"
- assertVisible: "Bogdan Dumitrache"

# --- Navigate back to Visits via bottom nav ---
- tapOn:
    text: "Visits"
- extendedWaitUntil:
    visible: ".*overview of your visits.*"
    timeout: 10000
