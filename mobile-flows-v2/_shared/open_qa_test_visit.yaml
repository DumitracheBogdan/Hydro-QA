appId: com.hydrocert.app
name: "V2 Shared - Navigate to QA Test Visit Detail"
tags:
  - shared
  - navigation
---

# Shared flow: Login, go to History tab, search for "QA test"
# visit, then tap "View Visit Details" to open it.
#
# The QA test visit has action items (with priorities and delete
# icons), unlike the default "testing visit" which has none.
# History tab is the only place with clickable "View Visit Details".
#
# Usage:
#   - runFlow: _shared/open_qa_test_visit.yaml

- runFlow: login.yaml

# Navigate to History tab (has clickable visit cards)
- tapOn:
    text: "History"
- extendedWaitUntil:
    visible: "View Visit Details"
    timeout: 15000

# Search for QA test visit (which has action items)
- tapOn:
    text: "Type to search.*"
- inputText: "QA"
- hideKeyboard
- extendedWaitUntil:
    visible: "QA test"
    timeout: 10000

# Open the visit detail
- tapOn:
    text: "View Visit Details"
- extendedWaitUntil:
    visible: "Visit Details"
    timeout: 15000
