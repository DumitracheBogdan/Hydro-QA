appId: com.hydrocert.app
name: "MOB48 V2 - Chlorine Dioxide fill and submit"
tags:
  - inspections
  - forms
  - regression
---

# Opens the Chlorine Dioxide Outlet Testing inspection on the QA test visit, fills the Notes
# field via its Edit dialog (the input whose selectors are proven on
# device; per-form accordion field labels are not reliable across
# 1.8.4x, so we fill Notes rather than guess), then asserts the form
# rendered and its Submit control is present. It does NOT submit -
# required fields are not all filled here; a full submit is covered by
# flows 45 and 49.

# CIRCLE: Notes, Submit
- runFlow: _shared/open_qa_test_visit.yaml

- tapOn:
    text: "Inspections.*"
- extendedWaitUntil:
    visible: "Start Inspection"
    timeout: 10000

# --- Open this inspection type via its own card ---
- scrollUntilVisible:
    element:
      text: "(Start Inspection|View Inspection)"
      below:
        text: ".*Chlorine Dioxide.*"
    direction: DOWN
    timeout: 15000
- tapOn:
    text: "(Start Inspection|View Inspection)"
    below:
      text: ".*Chlorine Dioxide.*"
- extendedWaitUntil:
    visible: "(Submit|Information|Unable|Notes)"
    timeout: 15000

# --- Fill Notes via its Edit dialog (idempotent) ---
- tapOn: "Edit"
- extendedWaitUntil:
    visible: "Save"
    timeout: 10000
- tapOn:
    below:
      text: "Notes"
- eraseText: 60
- inputText: "QA regression form check"
- hideKeyboard
- tapOn: "Save"

# --- Assert the form rendered, Notes saved, Submit present ---
# A real submit depends on this form type's required fields (not all
# filled here), so assert structure rather than submit-success. Full
# submit is covered by 45/49 where Notes alone completes the form.
- assertVisible: "QA regression form check"
- scrollUntilVisible:
    element:
      text: "^Submit$"
    direction: DOWN
    timeout: 20000
    speed: 40
- assertVisible: "^Submit$"
