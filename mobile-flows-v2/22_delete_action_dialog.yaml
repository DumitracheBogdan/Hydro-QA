appId: com.hydrocert.app
name: "MOB22 V2 - Delete action confirmation dialog"
tags:
  - visit-detail
  - actions
  - delete
  - smoke
---

# Opens a visit, creates a custom action via the FAB, then
# taps the delete icon to verify the confirmation dialog
# (Cancel/Delete buttons), and cancels without deleting.
#
# The "testing visit" (reachable via History) has no action
# items by default, so we add one via FAB before testing.
# Visits Home cards are NOT clickable (no "View Visit Details").

- runFlow: _shared/open_visit_detail.yaml

# --- Add a custom action via FAB ---
- tapOn:
    text: "Quick actions"
- extendedWaitUntil:
    visible: "Camera"
    timeout: 10000
- tapOn:
    text: "Actions"
    below:
      text: "gallery"
- extendedWaitUntil:
    visible: "Add Custom Action"
    timeout: 10000
- tapOn: "Add Custom Action"

# After tapping Add Custom Action, type a name and save.
- inputText: "CI Delete Test"
- tapOn: "Save"
- extendedWaitUntil:
    visible: "Visit Details"
    timeout: 15000

# --- Scroll down to find delete action icon ---
# The delete icon has content-desc "Delete action" (trash icon)
- scrollUntilVisible:
    element:
      text: "Delete action"
    direction: DOWN
    timeout: 15000

# --- Tap delete icon to open confirmation ---
- tapOn:
    text: "Delete action"

# --- Verify confirmation dialog ---
- extendedWaitUntil:
    visible: "Cancel"
    timeout: 10000
- assertVisible: "Cancel"
- assertVisible: "(Delete|Close|Confirm)"

# --- Cancel without deleting ---
- tapOn:
    text: "Cancel"

# --- Verify we're back on visit detail ---
- extendedWaitUntil:
    visible: "Visit Details"
    timeout: 10000

# --- Navigate back ---
- back
