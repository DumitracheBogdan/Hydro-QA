appId: com.hydrocert.app
name: "MOB22 V2 - Delete action confirmation dialog"
tags:
  - visit-detail
  - actions
  - delete
  - smoke
---

# Opens the QA test visit (guaranteed to hold one action item with a
# delete icon), scrolls to it, taps it to open the confirmation
# dialog, verifies Cancel/Delete buttons, then cancels without
# deleting.
#
# Anchored on the QA test visit - the previous "first visit in
# History" navigation broke whenever new seed visits (without
# actions) landed above it.

# CIRCLE: Delete
- runFlow: _shared/open_qa_test_visit.yaml

# --- Scroll down to find delete action icon ---
- scrollUntilVisible:
    element:
      text: "Delete action"
    direction: DOWN
    timeout: 15000

# --- Tap delete icon to open confirmation ---
- tapOn: "Delete action"

# --- Verify confirmation dialog ---
- assertVisible: "Cancel"
- assertVisible: "Delete"

# --- Cancel without deleting ---
- tapOn: "Cancel"

# --- Navigate back ---
- back
