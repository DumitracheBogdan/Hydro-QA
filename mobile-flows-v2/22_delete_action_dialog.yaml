appId: com.hydrocert.app
name: "MOB22 V2 - Delete action confirmation dialog"
tags:
  - visit-detail
  - actions
  - delete
  - smoke
---

# Opens the "QA test" visit, scrolls to an action item delete
# icon, taps it to open confirmation dialog, verifies
# Cancel/Delete buttons, then cancels without deleting.
# Source: exploration test 13_visit_detail_delete_action.yaml
#
# Navigates via History tab search because Visits Home cards
# are not clickable (no "View Visit Details" CTA there).

- runFlow: _shared/open_qa_test_visit.yaml

# --- Scroll down to find delete action icon ---
# The delete icon has content-desc "Delete action" in the
# UI hierarchy (trash icon next to action items)
- scrollUntilVisible:
    element:
      text: "Delete action"
    direction: DOWN
    timeout: 15000

# --- Tap delete icon to open confirmation ---
- tapOn:
    text: "Delete action"

# --- Verify confirmation dialog ---
- extendedWaitUntil:
    visible: "Cancel"
    timeout: 10000
- assertVisible: "Cancel"
- assertVisible: "(Delete|Close|Confirm)"

# --- Cancel without deleting ---
- tapOn:
    text: "Cancel"

# --- Verify we're back on visit detail ---
- extendedWaitUntil:
    visible: "Visit Details"
    timeout: 10000

# --- Navigate back ---
- back
