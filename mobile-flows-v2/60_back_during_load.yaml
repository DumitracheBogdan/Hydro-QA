appId: com.hydrocert.app
name: "MOB60 V2 - Back pressed during screen load lands safely"
tags:
  - navigation
  - interruption
  - regression
---

# Interruption edge case: tap a navigation CTA and press Back
# IMMEDIATELY, with no wait, so Back arrives while the target screen
# is still loading. Whatever the race outcome, the app must not crash,
# exit, or strand a spinner. Two interrupts are exercised (open a
# visit, and open an inspection). Sane-outcome anchors:
#   - "Activity" = bottom nav, present on any main tab screen (so Back
#     consumed the nav and we are on a list) - never on a detail screen
#   - "Quick actions" = the FAB, present only inside the visit detail
#     (so navigation won the race)
# One of the two is always true unless the app crashed or exited.

- runFlow: _shared/login.yaml

# --- Filter History to the QA test visit ---
- tapOn:
    text: "History"
- extendedWaitUntil:
    visible:
      text: "Type to search.*"
    timeout: 15000
- tapOn:
    text: "Type to search.*"
- inputText: "QA test"
- hideKeyboard
- scrollUntilVisible:
    element:
      text: "View Visit Details"
    direction: DOWN
    timeout: 20000

# --- Interrupt 1: open the visit then INSTANT Back ---
- tapOn: "View Visit Details"
- back

# Landed safely either way (list OR the visit detail rendered anyway)
- extendedWaitUntil:
    visible: "(Activity|Quick actions)"
    timeout: 20000

# If navigation won (visit detail showing), leave it
- runFlow:
    when:
      visible: "Quick actions"
    commands:
      - back
      - tapOn:
          text: "Not now"
          optional: true

# --- Re-open the visit for real to stage interrupt 2 ---
# Re-navigate through History deterministically (do not depend on the
# search placeholder, which is replaced by the live query text).
- tapOn:
    text: "History"
- extendedWaitUntil:
    visible: "(QA test|Type to search.*)"
    timeout: 15000
- scrollUntilVisible:
    element:
      text: "View Visit Details"
    direction: DOWN
    timeout: 20000
- tapOn: "View Visit Details"
- extendedWaitUntil:
    visible: "Inspections.*"
    timeout: 15000
- tapOn:
    text: "Inspections.*"
- extendedWaitUntil:
    visible: "(Start Inspection|View Inspection)"
    timeout: 10000

# --- Interrupt 2: open an inspection then INSTANT Back ---
- tapOn:
    text: "(Start Inspection|View Inspection)"
    index: 0
- back

# Landed safely: inspections list, the opened form, or the list under
# it. Exact "^Submit$" so the "Submit Samples" bar cannot satisfy it.
- extendedWaitUntil:
    visible: "(Start Inspection|View Inspection|^Submit$|Activity)"
    timeout: 20000

# If the form won the race, back out of it
- runFlow:
    when:
      visible: "^Submit$"
    commands:
      - back
      - tapOn:
          text: "Not now"
          optional: true

# --- Final: a main tab screen is responsive (bottom nav present) ---
- tapOn:
    text: "History"
    optional: true
- extendedWaitUntil:
    visible: "Activity"
    timeout: 15000
