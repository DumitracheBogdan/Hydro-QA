appId: com.hydrocert.app
name: "MOB53 V2 - Softener Servicing form fill and submit"
tags:
  - inspections
  - forms
  - regression
---

# Opens the "Softener Servicing" inspection on the dedicated "QA forms" fixture
# visit, fills the Notes field (present on every inspection type via
# its Edit dialog - the one input whose selectors are proven on
# device), then asserts the form rendered and its Submit control is
# present. It does NOT submit - required fields are not all filled
# here; a full submit is covered by flows 45 and 49. "Softener Servicing" is a
# NON water-sample job type; this flow never taps "Submit" or
# "Submit Samples".

# CIRCLE: Notes, Submit
- runFlow: _shared/open_qa_forms_visit.yaml

# --- Inspections tab ---
- tapOn:
    text: "Inspections.*"
- extendedWaitUntil:
    visible: "(Start Inspection|View Inspection)"
    timeout: 10000

# --- Open this specific inspection type (scroll its Start button in) ---
- scrollUntilVisible:
    element:
      text: "(Start Inspection|View Inspection)"
      below:
        text: ".*Softener.*"
    direction: DOWN
    timeout: 15000
- tapOn:
    text: "(Start Inspection|View Inspection)"
    below:
      text: ".*Softener.*"
- extendedWaitUntil:
    visible: "(Submit|Information|Unable|Notes)"
    timeout: 15000

# --- Fill the Notes field via its Edit dialog (idempotent) ---
- tapOn: "Edit"
- extendedWaitUntil:
    visible: "Save"
    timeout: 10000
- tapOn:
    below:
      text: "Notes"
- eraseText: 60
- inputText: "QA regression form check"
- hideKeyboard
- tapOn: "Save"

# --- Assert the form rendered, Notes saved, Submit present ---
# A real submit depends on this form type's required fields (not all
# filled here), so assert structure rather than submit-success. Full
# submit is covered by 45/49 where Notes alone completes the form.
- assertVisible: "QA regression form check"
- scrollUntilVisible:
    element:
      text: "^Submit$"
    direction: DOWN
    timeout: 20000
    speed: 40
- assertVisible: "^Submit$"
