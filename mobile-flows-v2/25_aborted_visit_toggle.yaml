appId: com.hydrocert.app
name: "MOB25 V2 - Aborted visit toggle and Submit button"
tags:
  - visit-detail
  - aborted-visit
  - save-button
---

# Toggles the Aborted-visit switch ON then back OFF and asserts the
# Submit button stays visible throughout (Maestro checks visibility,
# not enabled/disabled state). Exercises the toggle without crashing;
# it does not verify the button becoming enabled or a restored value.

# CIRCLE: Submit
- runFlow: _shared/open_visit_detail.yaml

# --- Scroll down to Aborted visit toggle ---
- scrollUntilVisible:
    element:
      text: "Aborted visit"
    direction: DOWN
    timeout: 10000

# --- Scroll further to bring Submit button into view (renamed from Save in 1.8.46) ---
- scrollUntilVisible:
    element:
      text: "Submit"
    direction: DOWN
    timeout: 10000
    speed: 40
    visibilityPercentage: 100

# --- Verify Submit button is visible ---
- assertVisible: "Submit"

# --- Toggle Aborted visit ON ---
- tapOn: "Aborted visit"

# --- Verify Submit button still visible (now active) ---
- assertVisible: "Submit"

# --- Toggle Aborted visit back OFF ---
- tapOn: "Aborted visit"

# --- Go back (no unsaved changes after toggling back) ---
- back
