appId: com.hydrocert.app
name: "MOB21 V2 - Priority picker dropdown"
tags:
  - visit-detail
  - priority
  - actions
  - smoke
---

# Opens a visit, creates a custom action via the FAB, then
# verifies the priority picker dropdown (Low/Medium/High).
#
# The "testing visit" (reachable via History) has no action
# items by default, so we add one via FAB before testing.
# Visits Home cards are NOT clickable (no "View Visit Details").

- runFlow: _shared/open_visit_detail.yaml

# --- Add a custom action via FAB ---
- tapOn:
    text: "Quick actions"
- extendedWaitUntil:
    visible: "Camera"
    timeout: 10000
- tapOn:
    text: "Actions"
    below:
      text: "gallery"
- extendedWaitUntil:
    visible: "Add Custom Action"
    timeout: 10000
- tapOn: "Add Custom Action"

# Add Custom Action adds a text field. Type a name, dismiss
# keyboard, Save to commit, then Cancel to close the sheet.
# (Save commits the action but the sheet stays open.)
- inputText: "CI Priority Test"
- hideKeyboard
- tapOn: "Save"
- tapOn: "Cancel"
- extendedWaitUntil:
    visible: "Quick actions"
    timeout: 15000

# --- Scroll down to find a priority badge in Actions area ---
- scrollUntilVisible:
    element:
      text: "(Low|Medium|High)"
    direction: DOWN
    timeout: 15000

# --- Tap the priority badge to open dropdown ---
- tapOn:
    text: "(Low|Medium|High)"

# --- Verify all three priority options visible ---
- extendedWaitUntil:
    visible: "Medium"
    timeout: 10000
- assertVisible: "Low"
- assertVisible: "Medium"
- assertVisible: "High"

# --- Dismiss picker without changing ---
- back

# --- Navigate back ---
- back
