appId: com.hydrocert.app
name: "MOB21 V2 - Priority picker dropdown"
tags:
  - visit-detail
  - priority
  - actions
  - smoke
---

# Opens the QA test visit (guaranteed to hold one action item with a
# priority badge), finds the badge, taps it to open the picker
# dropdown, verifies all options, dismisses.
#
# Anchored on the QA test visit - the previous "first visit in
# History" navigation broke whenever new seed visits (without
# actions) landed above it.

- runFlow: _shared/open_qa_test_visit.yaml

# --- Scroll down to find the priority badge in the Actions area ---
# Accept any current priority so a manual priority change on the QA
# visit does not fail the flow; the dropdown assert below still
# checks all three options.
- scrollUntilVisible:
    element:
      text: "(Low|Medium|High)"
    direction: DOWN
    timeout: 15000

# --- Tap the priority badge to open dropdown ---
- tapOn: "(Low|Medium|High)"

# --- Verify all three priority options visible ---
- assertVisible: "Low"
- assertVisible: "Medium"
- assertVisible: "High"

# --- Dismiss picker without changing ---
- back

# --- Navigate back ---
- back
