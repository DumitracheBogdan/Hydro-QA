appId: com.hydrocert.app
name: "MOB21 V2 - Priority picker dropdown"
tags:
  - visit-detail
  - priority
  - actions
  - smoke
---

# Opens the "QA test" visit (which has action items with
# priorities), finds a priority badge, taps it to open the
# picker dropdown, verifies all options, dismisses.
# Source: exploration test 12_visit_detail_priority_picker.yaml
#
# Navigates via History tab search because Visits Home cards
# are not clickable (no "View Visit Details" CTA there).

- runFlow: _shared/open_qa_test_visit.yaml

# --- Scroll down to find a priority badge in Actions area ---
- scrollUntilVisible:
    element:
      text: "(Low|Medium|High)"
    direction: DOWN
    timeout: 15000

# --- Tap the priority badge to open dropdown ---
- tapOn:
    text: "(Low|Medium|High)"

# --- Verify all three priority options visible ---
- extendedWaitUntil:
    visible: "Medium"
    timeout: 10000
- assertVisible: "Low"
- assertVisible: "Medium"
- assertVisible: "High"

# --- Dismiss picker without changing ---
- back

# --- Navigate back ---
- back
