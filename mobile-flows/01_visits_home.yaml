appId: com.hydrocert.app
name: "Visits Home Screen - All Elements"
tags:
  - visits
  - home
  - smoke
---

- startRecording: 01_visits_home


# =============================================
# VISITS HOME SCREEN (Default landing screen)
# =============================================

- launchApp

# --- Login if needed ---
- runFlow:
    when:
      visible: "Welcome back"
    commands:
      - tapOn: "Email"
      - inputText: "${MAESTRO_APP_EMAIL}"
      - tapOn: "Password"
      - inputText: "${MAESTRO_APP_PASSWORD}"
      - tapOn: "Login"
      - extendedWaitUntil:
          visible: "Visits"
          timeout: 15000

# --- Verify Home Screen Loaded ---
- assertVisible: "Welcome.*"
- assertVisible: "Here's an overview of your visits."

# --- Profile Avatar Button (top-right) ---
- tapOn:
    id: "BD"
    optional: true

# --- Search Input ---
- tapOn:
    text: "Type to search.*"
- inputText: "test"
- clearText

# --- Filter Chips ---
- tapOn:
    text: "Today"

- tapOn:
    text: "Tomorrow"

- tapOn:
    text: "Next week"

# --- Visit Card Elements ---
# Each card shows: Title, Status icon, Status text, Address, Time, Date, Reference #
# Booking Person info, Inspections count
- assertVisible: "Upcoming"
- assertVisible: "Inspections"
- assertVisible: "View Visit Details"

# --- Bottom Navigation Bar ---
- assertVisible: "Visits"
- assertVisible: "History"
- assertVisible: "Activity"
- assertVisible: "Account"

- stopRecording
