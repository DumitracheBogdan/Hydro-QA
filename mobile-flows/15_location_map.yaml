appId: com.hydrocert.app
name: "MOB15 - Location Map Navigation"
tags:
  - location
  - map
  - visit-detail
---

- startRecording: 15_location_map


# =============================================
# LOCATION MAP
# Navigate to visit detail, tap the Location icon,
# wait for map/intent to open, press back,
# and assert we return to the visit detail page.
# =============================================

- launchApp

# --- Navigate to a visit detail ---
- extendedWaitUntil:
    visible: "View Visit Details"
    timeout: 15000
- tapOn:
    text: "View Visit Details"

# --- Wait for visit detail to load ---
- extendedWaitUntil:
    visible: "Visit Details"
    timeout: 10000

# --- Assert Location icon is visible ---
- assertVisible:
    id: "Location"

# --- Tap Location icon to open map ---
- tapOn:
    id: "Location"

# --- Wait briefly for map or intent to load ---
- extendedWaitUntil:
    visible: ".*"
    timeout: 5000
    optional: true

# --- Press back to return to visit detail ---
- back

# --- Assert still on visit detail page ---
- extendedWaitUntil:
    visible: "Visit Details"
    timeout: 10000
- assertVisible: "Visit Details"

- stopRecording
