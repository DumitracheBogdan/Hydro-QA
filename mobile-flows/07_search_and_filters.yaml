appId: com.hydrocert.app
name: "Search & Filter Chips"
tags:
  - search
  - filters
  - smoke
---



# =============================================
# SEARCH & FILTER FUNCTIONALITY
# =============================================

- launchApp

# --- Login if needed ---
- runFlow:
    when:
      visible: "Welcome back"
    commands:
      - tapOn: "Email"
      - inputText: "${MAESTRO_APP_EMAIL}"
      - tapOn: "Password"
      - inputText: "${MAESTRO_APP_PASSWORD}"
      - tapOn: "Login"
      - extendedWaitUntil:
          visible: "Visits"
          timeout: 15000

# --- Search Input ---
- tapOn:
    text: "Type to search.*"
- inputText: "Avondale"
- assertVisible: "Avondale"
- eraseText

# --- Filter: Today ---
- tapOn:
    text: "Today"
# Verify filter applied (visits filtered)

# --- Filter: Tomorrow ---
- tapOn:
    text: "Tomorrow"

# --- Filter: Next week ---
- tapOn:
    text: "Next week"

# --- Deselect all (tap active filter again) ---
- tapOn:
    text: "Next week"

