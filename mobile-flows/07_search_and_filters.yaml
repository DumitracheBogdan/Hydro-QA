appId: com.hydrocert.app
name: "Search & Filter Chips"
tags:
  - search
  - filters
  - smoke
---



# =============================================
# SEARCH & FILTER FUNCTIONALITY
# =============================================

- launchApp:
    clearState: true

# --- Always do login (fresh app state) ---
- extendedWaitUntil:
    visible: "Welcome.*"
    timeout: 15000
- tapOn: "Email"
- inputText: "${MAESTRO_APP_EMAIL}"
- tapOn:
    text: "Password"
- inputText: "${MAESTRO_APP_PASSWORD}"
- tapOn: "Login"
- extendedWaitUntil:
    visible: "Welcome,"
    timeout: 20000

# --- Search Input ---
- tapOn:
    text: "Type to search.*"
- inputText: "Avondale"
- assertVisible: "Avondale"
- eraseText

# --- Filter: Today ---
- tapOn:
    text: "Today"
# Verify filter applied (visits filtered)

# --- Filter: Tomorrow ---
- tapOn:
    text: "Tomorrow"

# --- Filter: Next week ---
- tapOn:
    text: "Next week"

# --- Deselect all (tap active filter again) ---
- tapOn:
    text: "Next week"

