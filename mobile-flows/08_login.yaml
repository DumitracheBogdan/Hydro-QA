appId: com.hydrocert.app
name: "Login Screen - Elements and Validation"
tags:
  - login
  - authentication
  - critical
---

# =============================================
# LOGIN SCREEN VALIDATION
# Tests: login screen elements visible + successful login
# =============================================

- launchApp:
    clearState: true

# --- Verify Login Screen Loaded ---
- extendedWaitUntil:
    visible: "Welcome.*"
    timeout: 30000
- assertVisible: "Email"
- assertVisible: "Password"
- assertVisible: "Login"

# --- Verify Forgot Password Link (optional) ---
- assertVisible:
    text: "Forgot.*"
    optional: true

# --- Test Successful Login ---
- tapOn: "Email"
- inputText: "${MAESTRO_APP_EMAIL}"
- hideKeyboard
- tapOn:
    text: "Password"
- inputText: "${MAESTRO_APP_PASSWORD}"
- hideKeyboard
- tapOn: "Login"
- extendedWaitUntil:
    visible: "Welcome,"
    timeout: 60000
