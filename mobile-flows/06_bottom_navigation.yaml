appId: com.hydrocert.app
name: "Bottom Navigation - All Tabs"
tags:
  - navigation
  - smoke
---



# =============================================
# BOTTOM NAVIGATION BAR TEST
# Tests switching between all 4 bottom tabs
# =============================================

- launchApp

# --- Login if needed ---
- runFlow:
    when:
      visible: "Welcome"
    commands:
      - tapOn: "Email"
      - inputText: "${MAESTRO_APP_EMAIL}"
      - tapOn: "Password"
      - inputText: "${MAESTRO_APP_PASSWORD}"
      - tapOn: "Login"
      - extendedWaitUntil:
          visible: "Visits"
          timeout: 15000

# --- Visits Tab (default selected) ---
- assertVisible: "Welcome.*"

# --- Switch to History ---
- tapOn:
    text: "History"
- assertVisible: "Type to search.*"

# --- Switch to Activity ---
- tapOn:
    text: "Activity"

# --- Switch to Account ---
- tapOn:
    text: "Account"
- assertVisible: "Bogdan Dumitrache"

# --- Switch back to Visits ---
- tapOn:
    text: "Visits"
- assertVisible: "Welcome.*"

