appId: com.hydrocert.app
name: "Bottom Navigation - All Tabs"
tags:
  - navigation
  - smoke
---



# =============================================
# BOTTOM NAVIGATION BAR TEST
# Tests switching between all 4 bottom tabs
# =============================================

- launchApp:
    clearState: true

# --- Always do login (fresh app state) ---
- extendedWaitUntil:
    visible: "Welcome.*"
    timeout: 30000
- tapOn: "Email"
- inputText: "${MAESTRO_APP_EMAIL}"
- hideKeyboard
- tapOn:
    text: "Password"
- inputText: "${MAESTRO_APP_PASSWORD}"
- hideKeyboard
- tapOn: "Login"
- extendedWaitUntil:
    visible: "Welcome,"
    timeout: 60000

# --- Visits Tab (default selected) ---
- assertVisible: "Welcome.*"

# --- Switch to History ---
- tapOn:
    text: "History"
- assertVisible: "Type to search.*"

# --- Switch to Activity ---
- tapOn:
    text: "Activity"

# --- Switch to Account ---
- tapOn:
    text: "Account"
- assertVisible: "Bogdan Dumitrache"

# --- Switch back to Visits ---
- tapOn:
    text: "Visits"
- assertVisible: "Welcome.*"

