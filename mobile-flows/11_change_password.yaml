appId: com.hydrocert.app
name: "Change Password Screen - Elements and Validation"
tags:
  - account
  - password
  - smoke
---



# =============================================
# CHANGE PASSWORD SCREEN
# Tests: navigation, password fields, mismatch validation
# =============================================

- launchApp

# --- Login if needed ---
- runFlow:
    when:
      visible: "Welcome"
    commands:
      - tapOn: "Email"
      - inputText: "${MAESTRO_APP_EMAIL}"
      - tapOn: "Password"
      - inputText: "${MAESTRO_APP_PASSWORD}"
      - tapOn: "Login"
      - extendedWaitUntil:
          visible: "Visits"
          timeout: 15000

# --- Navigate to Account Tab ---
- tapOn:
    text: "Account"

# --- Verify Change Password Row Visible ---
- assertVisible: "Change Password"

# --- Tap Change Password ---
- tapOn:
    text: "Change Password"

# --- Verify Password Fields ---
- assertVisible: "Current Password"
- assertVisible: "New Password"
- assertVisible: "Confirm.*Password"

# --- Test Mismatched Passwords ---
- tapOn:
    text: "Current Password"
- inputText: "OldPassword123!"
- tapOn:
    text: "New Password"
- inputText: "NewPassword123!"
- tapOn:
    text: "Confirm.*Password"
- inputText: "DifferentPassword456!"

# Submit or tap save/change button
- tapOn:
    text: ".*[Cc]hange.*|.*[Ss]ave.*|.*[Ss]ubmit.*"
    optional: true

# Should show mismatch validation error
- assertVisible:
    text: ".*[Pp]asswords do not match.*"
    optional: true

# --- Navigate Back ---
- tapOn:
    id: "Back"
    optional: true
- back

# --- Verify Returned to Account Screen ---
- assertVisible: "Account"

