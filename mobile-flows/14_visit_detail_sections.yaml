appId: com.hydrocert.app
name: "MOB14 - Visit Detail Expandable Sections"
tags:
  - visit-detail
  - expandable
  - sections
---



# =============================================
# VISIT DETAIL SECTIONS
# Navigate to visit detail and expand each section row
# to verify content changes on tap.
# =============================================

- launchApp:
    clearState: true

# --- Always do login (fresh app state) ---
- extendedWaitUntil:
    visible: "Welcome.*"
    timeout: 15000
- tapOn: "Email"
- inputText: "${MAESTRO_APP_EMAIL}"
- hideKeyboard
- tapOn:
    text: "Password"
- inputText: "${MAESTRO_APP_PASSWORD}"
- hideKeyboard
- tapOn: "Login"
- extendedWaitUntil:
    visible: "Welcome,"
    timeout: 20000

# --- Navigate to a visit detail ---
- extendedWaitUntil:
    visible: "View Visit Details"
    timeout: 15000
- tapOn:
    text: "View Visit Details"

# --- Wait for visit detail to load ---
- extendedWaitUntil:
    visible: "Visit Details"
    timeout: 10000

# --- Tap "Visit Details" expandable row and verify it expands ---
- tapOn:
    text: "Visit Details"
- assertVisible: "Description"

# --- Tap "Client Signature" expandable row and verify it expands ---
- tapOn:
    text: "Client Signature"
- assertVisible: "Client Signature"

# --- Tap "Actions" expandable row and verify it expands ---
- tapOn:
    text: "Actions"
- extendedWaitUntil:
    visible: "Add Actions|No actions available."
    timeout: 5000
    optional: true

# --- Verify Location icon is visible ---
- assertVisible:
    id: "Location"

# --- Navigate back ---
- back

