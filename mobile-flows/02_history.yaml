appId: com.hydrocert.app
name: "History Screen"
tags:
  - history
  - smoke
---



# =============================================
# HISTORY SCREEN
# =============================================

- launchApp:
    clearState: true

# --- Always do login (fresh app state) ---
- extendedWaitUntil:
    visible: "Welcome.*"
    timeout: 30000
- tapOn: "Email"
- inputText: "${MAESTRO_APP_EMAIL}"
- hideKeyboard
- tapOn:
    text: "Password"
- inputText: "${MAESTRO_APP_PASSWORD}"
- hideKeyboard
- tapOn: "Login"
- extendedWaitUntil:
    visible: "overview of your visits"
    timeout: 60000

# --- Navigate to History tab ---
- tapOn:
    text: "History"

# --- Verify History Screen Loaded ---
# Profile avatar visible (top-right, clickable)

# --- Search Input ---
- tapOn:
    text: "Type to search.*"
- inputText: "QA"
- eraseText

# --- Visit Cards (same format as home) ---
- assertVisible: "View Visit Details"

# --- Bottom Navigation ---
- assertVisible: "Visits"
- assertVisible: "History"
- assertVisible: "Activity"
- assertVisible: "Account"

