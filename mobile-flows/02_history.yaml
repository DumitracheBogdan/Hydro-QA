appId: com.hydrocert.app
name: "History Screen"
tags:
  - history
  - smoke
---

- startRecording: 02_history


# =============================================
# HISTORY SCREEN
# =============================================

- launchApp

# --- Login if needed ---
- runFlow:
    when:
      visible: "Welcome back"
    commands:
      - tapOn: "Email"
      - inputText: "${MAESTRO_APP_EMAIL}"
      - tapOn: "Password"
      - inputText: "${MAESTRO_APP_PASSWORD}"
      - tapOn: "Login"
      - extendedWaitUntil:
          visible: "Visits"
          timeout: 15000

# --- Navigate to History tab ---
- tapOn:
    text: "History"

# --- Verify History Screen Loaded ---
# Profile avatar visible (top-right, clickable)

# --- Search Input ---
- tapOn:
    text: "Type to search.*"
- inputText: "QA"
- clearText

# --- Visit Cards (same format as home) ---
- assertVisible: "View Visit Details"

# --- Bottom Navigation ---
- assertVisible: "Visits"
- assertVisible: "History"
- assertVisible: "Activity"
- assertVisible: "Account"

- stopRecording
