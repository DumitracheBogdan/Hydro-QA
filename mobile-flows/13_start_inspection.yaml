appId: com.hydrocert.app
name: "MOB13 - Start Inspection Flow"
tags:
  - inspections
  - visit-detail
  - critical
---



# =============================================
# START INSPECTION
# Navigate to visit detail, open Inspections tab,
# tap Start Inspection, assert form loads, then go back.
# =============================================

- launchApp:
    clearState: true

# --- Always do login (fresh app state) ---
- extendedWaitUntil:
    visible: "Welcome.*"
    timeout: 30000
- tapOn: "Email"
- inputText: "${MAESTRO_APP_EMAIL}"
- hideKeyboard
- tapOn:
    text: "Password"
- inputText: "${MAESTRO_APP_PASSWORD}"
- hideKeyboard
- tapOn: "Login"
- extendedWaitUntil:
    visible: "Welcome,"
    timeout: 60000

# --- Navigate to a visit detail ---
- extendedWaitUntil:
    visible: "View Visit Details"
    timeout: 15000
- tapOn:
    text: "View Visit Details"

# --- Wait for visit detail to load ---
- extendedWaitUntil:
    visible: "Visit Details"
    timeout: 10000

# --- Tap Inspections tab ---
- tapOn:
    text: "Inspections.*"

# --- Assert inspection items are visible ---
- extendedWaitUntil:
    visible: "Start Inspection"
    timeout: 10000

# --- Tap Start Inspection on the first item ---
- tapOn:
    text: "Start Inspection"

# --- Assert inspection form loads (look for Notes or form fields) ---
- extendedWaitUntil:
    visible: "Notes"
    timeout: 15000

# --- Navigate back to visit detail ---
- back

# --- Assert we are back on visit detail ---
- extendedWaitUntil:
    visible: "Visit Details"
    timeout: 10000

