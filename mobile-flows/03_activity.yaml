appId: com.hydrocert.app
name: "Activity Screen"
tags:
  - activity
  - smoke
---

- startRecording: 03_activity


# =============================================
# ACTIVITY SCREEN
# =============================================

- launchApp

# --- Login if needed ---
- runFlow:
    when:
      visible: "Welcome back"
    commands:
      - tapOn: "Email"
      - inputText: "${MAESTRO_APP_EMAIL}"
      - tapOn: "Password"
      - inputText: "${MAESTRO_APP_PASSWORD}"
      - tapOn: "Login"
      - extendedWaitUntil:
          visible: "Visits"
          timeout: 15000

# --- Navigate to Activity tab ---
- tapOn:
    text: "Activity"

# --- Verify Activity Screen ---
- assertVisible: "No activities found."

# --- Profile Avatar (top-right, clickable) ---

# --- Bottom Navigation ---
- assertVisible: "Visits"
- assertVisible: "History"
- assertVisible: "Activity"
- assertVisible: "Account"

- stopRecording
