appId: com.hydrocert.app
name: "Account Screen - All Actions"
tags:
  - account
  - settings
  - smoke
---



# =============================================
# ACCOUNT SCREEN
# =============================================

- launchApp:
    clearState: true

# --- Always do login (fresh app state) ---
- extendedWaitUntil:
    visible: "Welcome.*"
    timeout: 15000
- tapOn: "Email"
- inputText: "${MAESTRO_APP_EMAIL}"
- tapOn:
    text: "Password"
- inputText: "${MAESTRO_APP_PASSWORD}"
- tapOn: "Login"
- extendedWaitUntil:
    visible: "Welcome,"
    timeout: 20000

# --- Navigate to Account tab ---
- tapOn:
    text: "Account"

# --- Verify Account Info ---
- assertVisible: "Bogdan Dumitrache"
- assertVisible: "User"

# --- My Signature Row (clickable, navigates to signature screen) ---
- assertVisible: "My signature"
- tapOn:
    text: "My signature"
# Go back
- tapOn:
    id: "Back"
    optional: true
- back

# --- Change Password Row (clickable) ---
- assertVisible:
    text: "Change Password"
    optional: true

# --- Logout Row (clickable) ---
- assertVisible: "Logout"

# --- Bottom Navigation ---
- assertVisible: "Visits"
- assertVisible: "History"
- assertVisible: "Activity"
- assertVisible: "Account"

