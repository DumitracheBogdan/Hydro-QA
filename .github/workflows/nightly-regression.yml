name: Nightly Regression (DEV)
run-name: "Nightly Regression (DEV) - ${{ github.event_name }}"

on:
  schedule:
    # Weeknights Mon-Fri: 3 AM Romania (EEST, UTC+3) = 0:00 UTC
    - cron: '0 0 * * 1-5'
    # Sunday full regression: 3 AM Romania (EEST, UTC+3) = 0:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: Regression mode
        required: true
        type: choice
        default: standard
        options:
          - standard
          - full
      run_mobile_tests:
        description: Run mobile app tests (Android emulator)
        required: true
        type: boolean
        default: false
      run_webapp_ui_tests:
        description: UI Change Detector web-app
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: nightly-regression-dev
  cancel-in-progress: false

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: Development
    outputs:
      mode: ${{ steps.mode.outputs.value }}
      mobile: ${{ steps.mode.outputs.mobile }}
      webapp_ui: ${{ steps.mode.outputs.webapp_ui }}
      total: ${{ steps.results.outputs.total }}
      passed: ${{ steps.results.outputs.passed }}
      failed: ${{ steps.results.outputs.failed }}
      skipped: ${{ steps.results.outputs.skipped }}
      failed_tests: ${{ steps.results.outputs.failed_tests }}
      run_url: ${{ steps.results.outputs.run_url }}
      date: ${{ steps.results.outputs.date }}
    env:
      HYDROCERT_TARGET_ENV: dev
      HYDROCERT_WEB_BASE: ${{ vars.HYDROCERT_DEV_WEB_BASE }}
      HYDROCERT_API_BASE: ${{ vars.HYDROCERT_DEV_API_BASE }}
      HYDROCERT_QA_EMAIL: ${{ secrets.HYDROCERT_QA_EMAIL }}
      HYDROCERT_QA_PASSWORD: ${{ secrets.HYDROCERT_QA_PASSWORD }}

    steps:
      # ── Determine regression mode ──────────────────────────────
      - name: Determine regression mode
        id: mode
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.mode }}" ]]; then
            MODE="${{ github.event.inputs.mode }}"
          elif [[ "${{ github.event.schedule }}" == "0 0 * * 0" ]]; then
            MODE="full"
          else
            MODE="standard"
          fi
          # Determine if mobile tests should run.
          # Mobile now runs on EVERY scheduled night (weeknights + Sunday),
          # matching the web nightly cadence, since the app is heading to
          # production and needs the same nightly safety net. Manual
          # dispatches still honour the run_mobile_tests checkbox.
          MOBILE="false"
          if [[ "${{ github.event.inputs.run_mobile_tests }}" == "true" ]]; then
            MOBILE="true"
          elif [[ -n "${{ github.event.schedule }}" ]]; then
            MOBILE="true"
          fi

          # Determine if webapp UI detector should run
          WEB_UI="false"
          if [[ "${{ github.event.inputs.run_webapp_ui_tests }}" == "true" ]]; then
            WEB_UI="true"
          elif [[ "${MODE}" == "full" ]]; then
            WEB_UI="true"
          fi

          echo "value=${MODE}" >> "$GITHUB_OUTPUT"
          echo "mobile=${MOBILE}" >> "$GITHUB_OUTPUT"
          echo "webapp_ui=${WEB_UI}" >> "$GITHUB_OUTPUT"
          echo "Regression mode: ${MODE} | Mobile: ${MOBILE} | WebappUI: ${WEB_UI}"

      # ── Checkout ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Validate configuration ─────────────────────────────────
      - name: Validate regression configuration
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${HYDROCERT_WEB_BASE}" ]]; then
            echo "Missing HYDROCERT_WEB_BASE" >&2; exit 1
          fi
          if [[ -z "${HYDROCERT_API_BASE}" ]]; then
            echo "Missing HYDROCERT_API_BASE" >&2; exit 1
          fi
          if [[ -z "${HYDROCERT_QA_EMAIL}" || -z "${HYDROCERT_QA_PASSWORD}" ]]; then
            echo "Missing QA credentials" >&2; exit 1
          fi

      # ── Node.js ────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # ── Python ─────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Excel dependency
        run: python -m pip install --upgrade pip openpyxl

      # ── Run regression bundle (WITHOUT mobile) ────────────────
      - name: Run regression bundle
        id: bundle
        shell: bash
        env:
          HYDROCERT_REGRESSION_MODE: ${{ steps.mode.outputs.value }}
          HYDROCERT_RUN_MOBILE: 'false'
        run: |
          set -euo pipefail
          node scripts/run_regression_bundle.mjs

      # ── UI Change Detector web-app ────────────────────────────
      - name: Run UI Change Detector web-app
        if: steps.mode.outputs.webapp_ui == 'true'
        continue-on-error: true
        env:
          WEBAPP_UI_MODE: compare
          WEBAPP_UI_MAX_PAGES: "80"
        run: |
          node scripts/run_webapp_ui_detector.mjs
          cp qa-artifacts/webapp-ui-detector/summary.json qa-artifacts/webapp-ui-detector/summary-run1.json
          node scripts/run_webapp_ui_detector.mjs
          cp qa-artifacts/webapp-ui-detector/summary.json qa-artifacts/webapp-ui-detector/summary-run2.json
          node scripts/webapp-ui-detector/compare-summaries.mjs \
            qa-artifacts/webapp-ui-detector/summary-run1.json \
            qa-artifacts/webapp-ui-detector/summary-run2.json
          if [[ -f qa-artifacts/webapp-ui-detector/diff.json ]]; then
            python scripts/generate_webapp_ui_detector_excel.py \
              --diff-json   qa-artifacts/webapp-ui-detector/diff.json \
              --screenshots qa-artifacts/webapp-ui-detector \
              --output      qa-artifacts/webapp-ui-detector/webapp-ui-detector.xlsx
          fi

      - name: Upload UI Change Detector web-app artifact
        if: steps.mode.outputs.webapp_ui == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: webapp-ui-detector-${{ github.run_id }}
          path: qa-artifacts/webapp-ui-detector/
          if-no-files-found: warn
          retention-days: 14

      # ── Upload artifacts ───────────────────────────────────────
      - name: Upload regression artifacts
        id: upload_bundle
        uses: actions/upload-artifact@v4
        with:
          name: hydrocert-dev-nightly-${{ steps.mode.outputs.value }}-${{ github.run_id }}
          path: ${{ steps.bundle.outputs.output_dir }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload Excel artifact
        id: upload_excel
        uses: actions/upload-artifact@v4
        with:
          name: hydrocert-dev-nightly-${{ steps.mode.outputs.value }}-excel-${{ github.run_id }}
          path: ${{ steps.bundle.outputs.excel_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload test videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-videos-${{ github.run_id }}
          path: |
            qa-artifacts/**/videos/
          if-no-files-found: ignore
          retention-days: 14

      # ── Publish workflow summary ───────────────────────────────
      - name: Publish workflow summary
        shell: bash
        run: |
          {
            echo "# Hydrocert Nightly Regression"
            echo ""
            echo "- Environment: dev"
            echo "- Mode: ${{ steps.mode.outputs.value }}"
            echo "- Total tests: ${{ steps.bundle.outputs.total_tests }}"
            echo "- Failed tests: ${{ steps.bundle.outputs.failed_tests }}"
            echo "- Excel artifact: $(basename '${{ steps.bundle.outputs.excel_path }}')"
            echo "- [Download Excel artifact](${{ steps.upload_excel.outputs.artifact-url }})"
            echo "- [Download full regression bundle](${{ steps.upload_bundle.outputs.artifact-url }})"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Build results JSON for Teams notification ──────────────
      - name: Build nightly results JSON
        id: results
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          TOTAL="${{ steps.bundle.outputs.total_tests }}"
          FAILED="${{ steps.bundle.outputs.failed_tests }}"
          PASS=$((${TOTAL:-0} - ${FAILED:-0}))
          SKIP="0"
          DATE="$(date -u +%Y-%m-%d)"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          EXCEL_URL="${{ steps.upload_excel.outputs.artifact-url }}"
          BUNDLE_URL="${{ steps.upload_bundle.outputs.artifact-url }}"
          MODE="${{ steps.mode.outputs.value }}"

          # Try to extract failed test details from the bundle summary JSON
          FAILED_DETAILS="[]"
          SUMMARY_FILE="${{ steps.bundle.outputs.output_dir }}/summary.json"
          if [[ -f "$SUMMARY_FILE" ]]; then
            # Extract skip count if available
            SKIP_VAL=$(jq -r '.skipped // 0' "$SUMMARY_FILE" 2>/dev/null || echo "0")
            if [[ "$SKIP_VAL" != "null" ]]; then
              SKIP="$SKIP_VAL"
              PASS=$((${TOTAL:-0} - ${FAILED:-0} - ${SKIP:-0}))
            fi
            # Extract failed test details if available
            FAILED_DETAILS=$(jq -c '[.failures[]? | {suite: .suite, id: .id, test: .title}]' "$SUMMARY_FILE" 2>/dev/null || echo "[]")
          fi

          # Build the results JSON
          cat > nightly-results.json <<'ENDJSON'
          {
            "title": "Hydrocert Nightly QA Report",
            "environment": "dev"
          }
          ENDJSON
          # Now build proper JSON with jq
          jq -n \
            --arg title "Hydrocert Nightly QA Report" \
            --arg env "dev" \
            --arg mode "${MODE}" \
            --arg date "${DATE}" \
            --argjson total "${TOTAL:-0}" \
            --argjson pass "${PASS:-0}" \
            --argjson fail "${FAILED:-0}" \
            --argjson skip "${SKIP:-0}" \
            --argjson failedTests "${FAILED_DETAILS}" \
            --arg runUrl "${RUN_URL}" \
            --arg excelArtifact "${EXCEL_URL:-}" \
            --arg bundleArtifact "${BUNDLE_URL:-}" \
            '{title:$title, environment:$env, mode:$mode, date:$date, totals:{total:$total, pass:$pass, fail:$fail, skip:$skip}, failedTests:$failedTests, links:{runUrl:$runUrl, excelArtifact:$excelArtifact, bundleArtifact:$bundleArtifact}}' \
            > nightly-results.json

          echo "json_path=nightly-results.json" >> "$GITHUB_OUTPUT"
          # Expose the web totals as step outputs so the notify job can build a
          # combined (web + mobile) Teams card.
          {
            echo "total=${TOTAL:-0}"
            echo "passed=${PASS:-0}"
            echo "failed=${FAILED:-0}"
            echo "skipped=${SKIP:-0}"
            echo "failed_tests=${FAILED_DETAILS}"
            echo "run_url=${RUN_URL}"
            echo "date=${DATE}"
          } >> "$GITHUB_OUTPUT"
          echo "Results JSON written:"
          cat nightly-results.json

  mobile:
    needs: nightly
    if: needs.nightly.outputs.mobile == 'true'
    uses: ./.github/workflows/post-deploy-regression-mobile.yml
    secrets: inherit

  # ── Combined Teams notification (web + mobile) ──────────────
  notify:
    needs: [nightly, mobile]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Teams channel (web + mobile)
        if: always()
        continue-on-error: true
        shell: bash
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          W_TOTAL: ${{ needs.nightly.outputs.total }}
          W_PASS: ${{ needs.nightly.outputs.passed }}
          W_FAIL: ${{ needs.nightly.outputs.failed }}
          W_SKIP: ${{ needs.nightly.outputs.skipped }}
          W_FAILED_TESTS: ${{ needs.nightly.outputs.failed_tests }}
          MODE: ${{ needs.nightly.outputs.mode }}
          DATE: ${{ needs.nightly.outputs.date }}
          RUN_URL: ${{ needs.nightly.outputs.run_url }}
          MOBILE_ENABLED: ${{ needs.nightly.outputs.mobile }}
          MOBILE_RESULT: ${{ needs.mobile.result }}
          M_TOTAL: ${{ needs.mobile.outputs.total }}
          M_PASS: ${{ needs.mobile.outputs.passed }}
          M_FAIL: ${{ needs.mobile.outputs.failed }}
          M_SKIP: ${{ needs.mobile.outputs.skipped }}
        run: |
          set -euo pipefail
          if [[ -z "${TEAMS_WEBHOOK_URL:-}" ]]; then
            echo "No TEAMS_WEBHOOK_URL secret set - skipping Teams notification."
            exit 0
          fi

          WT="${W_TOTAL:-0}"; WP="${W_PASS:-0}"; WF="${W_FAIL:-0}"; WS="${W_SKIP:-0}"
          MT="${M_TOTAL:-0}"; MP="${M_PASS:-0}"; MF="${M_FAIL:-0}"; MS="${M_SKIP:-0}"
          [[ -n "$MT" ]] || MT=0; [[ -n "$MP" ]] || MP=0; [[ -n "$MF" ]] || MF=0; [[ -n "$MS" ]] || MS=0
          MODE="${MODE:-standard}"
          DATE="${DATE:-$(date -u +%Y-%m-%d)}"

          TOTAL_FAIL=$(( ${WF:-0} + ${MF:-0} ))
          if [[ "${TOTAL_FAIL}" -eq 0 ]]; then ICON="✅"; else ICON="❌"; fi

          FT="${W_FAILED_TESTS:-[]}"
          echo "$FT" | jq . >/dev/null 2>&1 || FT="[]"

          jq -n \
            --arg icon "$ICON" --arg date "$DATE" --arg mode "$MODE" --arg runUrl "$RUN_URL" \
            --arg wt "$WT" --arg wp "$WP" --arg wf "$WF" --arg ws "$WS" \
            --arg menabled "$MOBILE_ENABLED" --arg mresult "$MOBILE_RESULT" \
            --arg mt "$MT" --arg mp "$MP" --arg mf "$MF" --arg ms "$MS" \
            --argjson failed "$FT" '
            def metrics(t;p;f;s):
              {type:"ColumnSet",spacing:"Small",columns:[
                {type:"Column",width:"stretch",items:[{type:"TextBlock",text:"Total",size:"Small",isSubtle:true,horizontalAlignment:"Center"},{type:"TextBlock",text:t,size:"Large",weight:"Bolder",horizontalAlignment:"Center"}]},
                {type:"Column",width:"stretch",items:[{type:"TextBlock",text:"Passed",size:"Small",color:"Good",horizontalAlignment:"Center"},{type:"TextBlock",text:p,size:"Large",weight:"Bolder",color:"Good",horizontalAlignment:"Center"}]},
                {type:"Column",width:"stretch",items:[{type:"TextBlock",text:"Failed",size:"Small",color:"Attention",horizontalAlignment:"Center"},{type:"TextBlock",text:f,size:"Large",weight:"Bolder",color:"Attention",horizontalAlignment:"Center"}]},
                {type:"Column",width:"stretch",items:[{type:"TextBlock",text:"Skipped",size:"Small",color:"Warning",horizontalAlignment:"Center"},{type:"TextBlock",text:s,size:"Large",weight:"Bolder",color:"Warning",horizontalAlignment:"Center"}]}
              ]};
            ( [ {type:"TextBlock",text:($icon+" Hydrocert Nightly QA Report"),weight:"Bolder",size:"Large"},
                {type:"TextBlock",text:("Date: "+$date+" | Environment: DEV | Mode: "+$mode),size:"Small",isSubtle:true,spacing:"None"},
                {type:"TextBlock",text:"Web",weight:"Bolder",spacing:"Medium"},
                metrics($wt;$wp;$wf;$ws) ]
              + ( if $menabled=="true" and $mresult!="skipped"
                  then [ {type:"TextBlock",text:"Mobile",weight:"Bolder",spacing:"Medium"}, metrics($mt;$mp;$mf;$ms) ]
                  elif $menabled=="true"
                  then [ {type:"TextBlock",text:"Mobile: run did not complete",size:"Small",color:"Warning",spacing:"Medium"} ]
                  else [] end )
              + ( if ($failed|length)>0
                  then [ {type:"TextBlock",text:"Failed tests (web):",weight:"Bolder",spacing:"Medium"} ]
                       + [ $failed[] | {type:"TextBlock",text:("- "+(.suite//"")+" / "+(.id//"")+" - "+(.test//"")),size:"Small",wrap:true,spacing:"None"} ]
                  else [] end )
            ) as $body |
            {type:"message",attachments:[{contentType:"application/vnd.microsoft.card.adaptive",contentUrl:null,
              content:{"$schema":"http://adaptivecards.io/schemas/adaptive-card.json",type:"AdaptiveCard",version:"1.4",
                body:$body,actions:[{type:"Action.OpenUrl",title:"View Run",url:$runUrl}]}}]}
            ' > teams-payload.json

          echo "Sending combined Adaptive Card to Teams..."
          HTTP_STATUS=$(curl -s -o teams-response.txt -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" -d @teams-payload.json "${TEAMS_WEBHOOK_URL}")
          echo "Webhook response status: ${HTTP_STATUS}"
          cat teams-response.txt 2>/dev/null || true
          if [[ "${HTTP_STATUS}" -ge 200 && "${HTTP_STATUS}" -lt 300 ]]; then
            echo "Teams notification sent successfully."
          else
            echo "::warning::Teams webhook returned HTTP ${HTTP_STATUS}."
          fi
