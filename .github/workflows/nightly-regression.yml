name: Nightly Regression (DEV)
run-name: "Nightly Regression (DEV) - ${{ github.event_name }}"

on:
  schedule:
    # Weeknights Mon-Fri: 3 AM Romania (EEST, UTC+3) = 0:00 UTC
    - cron: '0 0 * * 1-5'
    # Sunday full regression: 3 AM Romania (EEST, UTC+3) = 0:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: Regression mode
        required: true
        type: choice
        default: standard
        options:
          - standard
          - full
      run_mobile_tests:
        description: Run mobile app tests (Android emulator)
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: nightly-regression-dev
  cancel-in-progress: false

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: Development
    env:
      HYDROCERT_TARGET_ENV: dev
      HYDROCERT_WEB_BASE: ${{ vars.HYDROCERT_DEV_WEB_BASE }}
      HYDROCERT_API_BASE: ${{ vars.HYDROCERT_DEV_API_BASE }}
      HYDROCERT_QA_EMAIL: ${{ secrets.HYDROCERT_QA_EMAIL }}
      HYDROCERT_QA_PASSWORD: ${{ secrets.HYDROCERT_QA_PASSWORD }}

    steps:
      # ── Determine regression mode ──────────────────────────────
      - name: Determine regression mode
        id: mode
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.mode }}" ]]; then
            MODE="${{ github.event.inputs.mode }}"
          elif [[ "${{ github.event.schedule }}" == "0 0 * * 0" ]]; then
            MODE="full"
          else
            MODE="standard"
          fi
          # Determine if mobile tests should run
          MOBILE="false"
          if [[ "${{ github.event.inputs.run_mobile_tests }}" == "true" ]]; then
            MOBILE="true"
          elif [[ "${MODE}" == "full" ]]; then
            MOBILE="true"
          fi

          echo "value=${MODE}" >> "$GITHUB_OUTPUT"
          echo "mobile=${MOBILE}" >> "$GITHUB_OUTPUT"
          echo "Regression mode: ${MODE} | Mobile: ${MOBILE}"

      # ── Checkout ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Validate configuration ─────────────────────────────────
      - name: Validate regression configuration
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${HYDROCERT_WEB_BASE}" ]]; then
            echo "Missing HYDROCERT_WEB_BASE" >&2; exit 1
          fi
          if [[ -z "${HYDROCERT_API_BASE}" ]]; then
            echo "Missing HYDROCERT_API_BASE" >&2; exit 1
          fi
          if [[ -z "${HYDROCERT_QA_EMAIL}" || -z "${HYDROCERT_QA_PASSWORD}" ]]; then
            echo "Missing QA credentials" >&2; exit 1
          fi

      # ── Node.js ────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # ── Python ─────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Excel dependency
        run: python -m pip install --upgrade pip openpyxl

      # ── Run regression bundle (WITHOUT mobile) ────────────────
      - name: Run regression bundle
        id: bundle
        shell: bash
        env:
          HYDROCERT_REGRESSION_MODE: ${{ steps.mode.outputs.value }}
          HYDROCERT_RUN_MOBILE: 'false'
        run: |
          set -euo pipefail
          node scripts/run_regression_bundle.mjs

      # ── Enable KVM for Android emulator hardware acceleration ──
      - name: Enable KVM
        if: steps.mode.outputs.mobile == 'true'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── Run mobile tests on Android emulator ───────────────────
      - name: Run mobile tests (Android emulator)
        id: mobile
        if: steps.mode.outputs.mobile == 'true'
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: bash $GITHUB_WORKSPACE/scripts/run-mobile-with-recording.sh
        env:
          GH_TOKEN: ${{ github.token }}
          HYDROCERT_WEB_BASE: ${{ vars.HYDROCERT_DEV_WEB_BASE }}
          HYDROCERT_API_BASE: ${{ vars.HYDROCERT_DEV_API_BASE }}

      # ── Upload artifacts ───────────────────────────────────────
      - name: Upload regression artifacts
        id: upload_bundle
        uses: actions/upload-artifact@v4
        with:
          name: hydrocert-dev-nightly-${{ steps.mode.outputs.value }}-${{ github.run_id }}
          path: ${{ steps.bundle.outputs.output_dir }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload Excel artifact
        id: upload_excel
        uses: actions/upload-artifact@v4
        with:
          name: hydrocert-dev-nightly-${{ steps.mode.outputs.value }}-excel-${{ github.run_id }}
          path: ${{ steps.bundle.outputs.excel_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload test videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-videos-${{ github.run_id }}
          path: |
            qa-artifacts/**/videos/
            qa-artifacts/mobile-videos/
          if-no-files-found: ignore
          retention-days: 14

      # ── Publish workflow summary ───────────────────────────────
      - name: Publish workflow summary
        shell: bash
        run: |
          {
            echo "# Hydrocert Nightly Regression"
            echo ""
            echo "- Environment: dev"
            echo "- Mode: ${{ steps.mode.outputs.value }}"
            echo "- Total tests: ${{ steps.bundle.outputs.total_tests }}"
            echo "- Failed tests: ${{ steps.bundle.outputs.failed_tests }}"
            echo "- Excel artifact: $(basename '${{ steps.bundle.outputs.excel_path }}')"
            echo "- [Download Excel artifact](${{ steps.upload_excel.outputs.artifact-url }})"
            echo "- [Download full regression bundle](${{ steps.upload_bundle.outputs.artifact-url }})"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Build results JSON for Teams notification ──────────────
      - name: Build nightly results JSON
        id: results
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          TOTAL="${{ steps.bundle.outputs.total_tests }}"
          FAILED="${{ steps.bundle.outputs.failed_tests }}"
          PASS=$((${TOTAL:-0} - ${FAILED:-0}))
          SKIP="0"
          DATE="$(date -u +%Y-%m-%d)"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          EXCEL_URL="${{ steps.upload_excel.outputs.artifact-url }}"
          BUNDLE_URL="${{ steps.upload_bundle.outputs.artifact-url }}"
          MODE="${{ steps.mode.outputs.value }}"

          # Try to extract failed test details from the bundle summary JSON
          FAILED_DETAILS="[]"
          SUMMARY_FILE="${{ steps.bundle.outputs.output_dir }}/summary.json"
          if [[ -f "$SUMMARY_FILE" ]]; then
            # Extract skip count if available
            SKIP_VAL=$(jq -r '.skipped // 0' "$SUMMARY_FILE" 2>/dev/null || echo "0")
            if [[ "$SKIP_VAL" != "null" ]]; then
              SKIP="$SKIP_VAL"
              PASS=$((${TOTAL:-0} - ${FAILED:-0} - ${SKIP:-0}))
            fi
            # Extract failed test details if available
            FAILED_DETAILS=$(jq -c '[.failures[]? | {suite: .suite, id: .id, test: .title}]' "$SUMMARY_FILE" 2>/dev/null || echo "[]")
          fi

          # Build the results JSON
          cat > nightly-results.json <<'ENDJSON'
          {
            "title": "Hydrocert Nightly QA Report",
            "environment": "dev"
          }
          ENDJSON
          # Now build proper JSON with jq
          jq -n \
            --arg title "Hydrocert Nightly QA Report" \
            --arg env "dev" \
            --arg mode "${MODE}" \
            --arg date "${DATE}" \
            --argjson total "${TOTAL:-0}" \
            --argjson pass "${PASS:-0}" \
            --argjson fail "${FAILED:-0}" \
            --argjson skip "${SKIP:-0}" \
            --argjson failedTests "${FAILED_DETAILS}" \
            --arg runUrl "${RUN_URL}" \
            --arg excelArtifact "${EXCEL_URL:-}" \
            --arg bundleArtifact "${BUNDLE_URL:-}" \
            '{title:$title, environment:$env, mode:$mode, date:$date, totals:{total:$total, pass:$pass, fail:$fail, skip:$skip}, failedTests:$failedTests, links:{runUrl:$runUrl, excelArtifact:$excelArtifact, bundleArtifact:$bundleArtifact}}' \
            > nightly-results.json

          echo "json_path=nightly-results.json" >> "$GITHUB_OUTPUT"
          echo "Results JSON written:"
          cat nightly-results.json

      # ── Send Teams notification via Incoming Webhook ─────────
      - name: Notify Teams channel
        if: always()
        continue-on-error: true
        shell: bash
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [[ -z "${TEAMS_WEBHOOK_URL}" ]]; then
            echo "No TEAMS_WEBHOOK_URL secret set — skipping Teams notification."
            exit 0
          fi

          # Read results
          TOTAL=$(jq -r '.totals.total' nightly-results.json 2>/dev/null || echo "0")
          PASS=$(jq -r '.totals.pass' nightly-results.json 2>/dev/null || echo "0")
          FAIL=$(jq -r '.totals.fail' nightly-results.json 2>/dev/null || echo "0")
          SKIP=$(jq -r '.totals.skip' nightly-results.json 2>/dev/null || echo "0")
          MODE=$(jq -r '.mode' nightly-results.json 2>/dev/null || echo "standard")
          DATE=$(jq -r '.date' nightly-results.json 2>/dev/null || date -u +%Y-%m-%d)
          RUN_URL=$(jq -r '.links.runUrl' nightly-results.json 2>/dev/null || echo "")

          # Build failed tests rows for the table
          FAILED_ROWS=""
          FAIL_COUNT=$(jq '.failedTests | length' nightly-results.json 2>/dev/null || echo "0")
          if [[ "$FAIL_COUNT" -gt 0 ]]; then
            FAILED_ROWS=$(jq -r '.failedTests[] | "{\"type\":\"TableRow\",\"cells\":[{\"type\":\"TableCell\",\"items\":[{\"type\":\"TextBlock\",\"text\":\"\(.suite)\",\"size\":\"Small\"}]},{\"type\":\"TableCell\",\"items\":[{\"type\":\"TextBlock\",\"text\":\"\(.id)\",\"size\":\"Small\"}]},{\"type\":\"TableCell\",\"items\":[{\"type\":\"TextBlock\",\"text\":\"\(.test)\",\"size\":\"Small\",\"wrap\":true}]}]}"' nightly-results.json 2>/dev/null | paste -sd ',' -)
          fi

          # Determine status color and icon
          if [[ "$FAIL" -eq 0 ]]; then
            STATUS_COLOR="Good"
            STATUS_TEXT="All tests passed!"
            STATUS_ICON="✅"
          else
            STATUS_COLOR="Attention"
            STATUS_TEXT="${FAIL} test(s) failed"
            STATUS_ICON="❌"
          fi

          # Build failed tests section (only if failures exist)
          FAILED_SECTION=""
          if [[ "$FAIL_COUNT" -gt 0 ]]; then
            FAILED_SECTION=',{
              "type": "TextBlock",
              "text": "Failed Tests:",
              "weight": "Bolder",
              "size": "Medium",
              "spacing": "Medium"
            },
            {
              "type": "Table",
              "columns": [
                {"width": 1},
                {"width": 1},
                {"width": 3}
              ],
              "rows": [
                {
                  "type": "TableRow",
                  "style": "Accent",
                  "cells": [
                    {"type":"TableCell","items":[{"type":"TextBlock","text":"Suite","weight":"Bolder","size":"Small"}]},
                    {"type":"TableCell","items":[{"type":"TextBlock","text":"ID","weight":"Bolder","size":"Small"}]},
                    {"type":"TableCell","items":[{"type":"TextBlock","text":"Test","weight":"Bolder","size":"Small"}]}
                  ]
                },
                '"${FAILED_ROWS}"'
              ]
            }'
          else
            FAILED_SECTION=',{
              "type": "TextBlock",
              "text": "✅ All tests passed!",
              "size": "Medium",
              "color": "Good",
              "weight": "Bolder",
              "spacing": "Medium"
            }'
          fi

          # Build the Adaptive Card payload
          cat > teams-payload.json <<ENDJSON
          {
            "type": "message",
            "attachments": [
              {
                "contentType": "application/vnd.microsoft.card.adaptive",
                "contentUrl": null,
                "content": {
                  "\$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  "type": "AdaptiveCard",
                  "version": "1.4",
                  "body": [
                    {
                      "type": "TextBlock",
                      "text": "${STATUS_ICON} Hydrocert Nightly QA Report",
                      "weight": "Bolder",
                      "size": "Large"
                    },
                    {
                      "type": "TextBlock",
                      "text": "Date: ${DATE} | Environment: DEV | Mode: ${MODE}",
                      "size": "Small",
                      "isSubtle": true,
                      "spacing": "None"
                    },
                    {
                      "type": "ColumnSet",
                      "spacing": "Medium",
                      "columns": [
                        {
                          "type": "Column",
                          "width": "stretch",
                          "items": [{"type":"TextBlock","text":"Total","size":"Small","isSubtle":true,"horizontalAlignment":"Center"},{"type":"TextBlock","text":"${TOTAL}","size":"ExtraLarge","weight":"Bolder","horizontalAlignment":"Center"}]
                        },
                        {
                          "type": "Column",
                          "width": "stretch",
                          "items": [{"type":"TextBlock","text":"Passed","size":"Small","color":"Good","horizontalAlignment":"Center"},{"type":"TextBlock","text":"${PASS}","size":"ExtraLarge","weight":"Bolder","color":"Good","horizontalAlignment":"Center"}]
                        },
                        {
                          "type": "Column",
                          "width": "stretch",
                          "items": [{"type":"TextBlock","text":"Failed","size":"Small","color":"Attention","horizontalAlignment":"Center"},{"type":"TextBlock","text":"${FAIL}","size":"ExtraLarge","weight":"Bolder","color":"Attention","horizontalAlignment":"Center"}]
                        },
                        {
                          "type": "Column",
                          "width": "stretch",
                          "items": [{"type":"TextBlock","text":"Skipped","size":"Small","color":"Warning","horizontalAlignment":"Center"},{"type":"TextBlock","text":"${SKIP}","size":"ExtraLarge","weight":"Bolder","color":"Warning","horizontalAlignment":"Center"}]
                        }
                      ]
                    }
                    ${FAILED_SECTION}
                  ],
                  "actions": [
                    {
                      "type": "Action.OpenUrl",
                      "title": "View Run",
                      "url": "${RUN_URL}"
                    }
                  ]
                }
              }
            ]
          }
          ENDJSON

          echo "Sending Adaptive Card to Teams..."
          HTTP_STATUS=$(curl -s -o /tmp/teams-response.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d @teams-payload.json \
            "${TEAMS_WEBHOOK_URL}")

          echo "Webhook response status: ${HTTP_STATUS}"
          cat /tmp/teams-response.txt 2>/dev/null || true
          if [[ "${HTTP_STATUS}" -ge 200 && "${HTTP_STATUS}" -lt 300 ]]; then
            echo "Teams notification sent successfully."
          else
            echo "::warning::Teams webhook returned HTTP ${HTTP_STATUS}. Notification may not have been delivered."
          fi
