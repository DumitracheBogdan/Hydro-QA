name: UI Change Detector Mobile (Android Emulator)

on:
  workflow_dispatch:
    inputs:
      run_detector:
        description: "UI Change Detector Mobile (Android Emulator)"
        type: boolean
        default: true
  push:
    branches:
      - fix/maestro-v2
      - fix/maestro-v2-round2
    paths:
      - '.github/workflows/mobile-v2.yml'
      - 'scripts/run-mobile-v2-*.sh'
      - 'mobile-flows-v2/**'
      - '.v2-trigger'

permissions:
  contents: read

jobs:
  mobile:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_detector }}
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve run mode
        id: mode
        shell: bash
        run: |
          # workflow_dispatch (checkbox) -> qa-check; push -> read .v2-trigger or default "discovery"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RAW_MODE="qa-check"
          else
            RAW_MODE=""
            if [[ -f .v2-trigger ]]; then
              RAW_MODE=$(tr -d '[:space:]' < .v2-trigger)
            fi
          fi
          case "$RAW_MODE" in
            discovery) ;;
            test) ;;
            qa-check) ;;
            *) RAW_MODE="discovery" ;;
          esac
          echo "value=$RAW_MODE" >> "$GITHUB_OUTPUT"
          echo "Resolved mode: $RAW_MODE"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Validate mobile secrets
        shell: bash
        env:
          MAESTRO_APP_EMAIL: ${{ secrets.HYDROCERT_MOBILE_QA_EMAIL }}
          MAESTRO_APP_PASSWORD: ${{ secrets.HYDROCERT_MOBILE_QA_PASSWORD }}
        run: |
          if [[ -z "${MAESTRO_APP_EMAIL}" || -z "${MAESTRO_APP_PASSWORD}" ]]; then
            echo "::error::Missing HYDROCERT_MOBILE_QA_EMAIL or HYDROCERT_MOBILE_QA_PASSWORD secret"
            exit 1
          fi
          echo "Mobile secrets present"

      - name: Run mobile V2 (${{ steps.mode.outputs.value }}) on Android emulator
        id: mobile
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          emulator-boot-timeout: 600
          script: bash $GITHUB_WORKSPACE/scripts/run-mobile-v2-${{ steps.mode.outputs.value }}.sh
        env:
          GH_TOKEN: ${{ github.token }}
          MAESTRO_APP_EMAIL: ${{ secrets.HYDROCERT_MOBILE_QA_EMAIL }}
          MAESTRO_APP_PASSWORD: ${{ secrets.HYDROCERT_MOBILE_QA_PASSWORD }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-v2-${{ steps.mode.outputs.value }}-${{ github.run_id }}
          path: |
            qa-artifacts/mobile-v2/
            qa-artifacts/change-detector/
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish workflow summary
        if: always()
        shell: bash
        run: |
          MODE="${{ steps.mode.outputs.value }}"
          {
            if [[ "$MODE" == "qa-check" ]]; then
              # ----- QA-Check summary -----
              echo "## QA Change Detector (standalone)"
              echo ""
              DETECTOR_RESULT=$(ls -1t qa-artifacts/change-detector/scan_results_*.json 2>/dev/null | head -1)
              if [[ -n "$DETECTOR_RESULT" ]]; then
                node -e "
                  const s = require('./$DETECTOR_RESULT');
                  const sum = s.summary || {};
                  console.log('- Screens scanned: ' + (sum.screens_scanned || 0));
                  console.log('- New elements found: ' + (sum.total_new_elements || 0));
                  if (sum.total_new_elements > 0) {
                    console.log('');
                    console.log('**New UI elements detected — review recommended!**');
                    for (const [name, info] of Object.entries(s.screens || {})) {
                      const els = info.new_elements || [];
                      if (els.length > 0) {
                        console.log('  - ' + name + ': ' + els.length + ' new element(s)');
                      }
                    }
                  } else {
                    console.log('');
                    console.log('All screens match baseline. No new elements detected.');
                  }
                " 2>/dev/null || echo "QA Change Detector summary parse failed"
              else
                echo "No scan results found — scanner may have failed. Check logs."
              fi
            else
              # ----- Normal test/discovery summary -----
              echo "## Mobile V2 ($MODE)"
              echo ""
              SUMMARY_FILE="qa-artifacts/mobile-v2/$MODE/summary.json"
              if [[ -f "$SUMMARY_FILE" ]]; then
                node -e "const s=require('./$SUMMARY_FILE'); console.log('- Mode: ' + (s.mode || '$MODE')); console.log('- Total: ' + s.totals.total); console.log('- Passed: ' + s.totals.pass); console.log('- Failed: ' + s.totals.fail); console.log('- Skipped: ' + s.totals.skip);" || echo "Summary parse failed"
              else
                echo "No summary file at $SUMMARY_FILE"
              fi
            fi
            echo ""
            echo "Artifact: mobile-v2-$MODE-${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"
