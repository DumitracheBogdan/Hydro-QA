name: Bidirectional Parity (dev)
run-name: "Bidirectional Parity - ${{ github.event_name }}"

on:
  workflow_dispatch:
    inputs:
      visit_ref:
        description: "Reuse an existing visit ref (skip create). Leave blank for a fresh visit."
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: bidirectional-parity-dev
  cancel-in-progress: false

jobs:
  parity:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    environment: Development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Unit tests (parity API scripts)
        run: node --test scripts/parity/*.test.mjs

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run bidirectional parity (Android emulator)
        id: parity
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          emulator-boot-timeout: 600
          script: bash $GITHUB_WORKSPACE/scripts/run-parity-test.sh
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
          VISIT_REF: ${{ github.event.inputs.visit_ref }}
          HYDROCERT_API_BASE: ${{ vars.HYDROCERT_DEV_API_BASE }}
          # webapp-UI evidence layer (Phase 2.5, non-gating): Playwright logs into the dev webapp to
          # screenshot the web side of each datum.
          HYDROCERT_DEV_WEB_BASE: ${{ vars.HYDROCERT_DEV_WEB_BASE }}
          HYDROCERT_QA_EMAIL: ${{ secrets.HYDROCERT_QA_EMAIL }}
          HYDROCERT_QA_PASSWORD: ${{ secrets.HYDROCERT_QA_PASSWORD }}
          # admin (engineer) creates the visit via API; the dedicated parity engineer logs into mobile
          # and is the assigned engineer (its password has no special chars -> types cleanly via Maestro).
          API_EMAIL: ${{ secrets.HYDROCERT_DEV_API_EMAIL }}
          API_PASSWORD: ${{ secrets.HYDROCERT_DEV_API_PASSWORD }}
          MOBILE_EMAIL: ${{ secrets.HYDROCERT_PARITY_MOBILE_EMAIL }}
          MOBILE_PASSWORD: ${{ secrets.HYDROCERT_PARITY_MOBILE_PASSWORD }}
          MAESTRO_APP_EMAIL: ${{ secrets.HYDROCERT_PARITY_MOBILE_EMAIL }}
          MAESTRO_APP_PASSWORD: ${{ secrets.HYDROCERT_PARITY_MOBILE_PASSWORD }}

      - name: Upload artifacts
        if: always()
        id: upload_bundle
        uses: actions/upload-artifact@v4
        with:
          name: parity-report
          path: |
            qa-artifacts/parity/**
            summary.json
            report.html
          retention-days: 14

      - name: Upload parity evidence Excel
        if: always()
        id: upload_excel
        uses: actions/upload-artifact@v4
        with:
          name: parity-evidence-excel-${{ github.run_id }}
          path: qa-artifacts/parity/parity-evidence.xlsx
          if-no-files-found: warn
          retention-days: 14

      - name: Publish workflow summary
        if: always()
        shell: bash
        run: |
          set +e
          {
            echo "## Bidirectional Parity — Dual-UI Evidence (connection + webapp + mobile)"
            echo ""
            if [[ -f summary.json ]]; then
              node -e "
                const s = require('./summary.json');
                const checks = Array.isArray(s.checks) ? s.checks : [];
                const gate = s.gateFailed ? ':red_circle: **GATE FAIL**' : ':white_check_mark: **GATE PASS**';
                console.log('**' + s.passed + '/' + s.total + ' PASS** — visit \`' + s.visitRef + '\` — ' + gate);
                console.log('');
                console.log('| Total | Passed | Failed |');
                console.log('|-------|--------|--------|');
                console.log('| ' + (s.total||0) + ' | ' + (s.passed||0) + ' | ' + (s.failed||0) + ' |');
                console.log('');
                console.log('### Checks — each datum verified on the connection (API GET) + screenshotted on the webapp AND mobile');
                console.log('');
                console.log('| Check | Direction | Result | Details |');
                console.log('|-------|-----------|--------|---------|');
                const icon = (st) => st === 'PASS' ? '✅ PASS' : st === 'FAIL' ? '❌ FAIL' : st === 'SKIP' ? '⏭️ SKIP' : st;
                for (const c of checks) {
                  const det = String(c.details || '').replace(/\|/g, '\\\\|').replace(/\r?\n/g, ' ');
                  console.log('| \`' + (c.id || '?') + '\` | ' + (c.direction || '') + ' | ' + icon(c.status || '') + ' | ' + det + ' |');
                }
              " 2>/dev/null || echo "_summary parse failed_"
            else
              echo "_No summary produced (early failure — see artifacts/logs)._"
            fi
            echo ""
            echo "---"
            echo ""
            echo "📥 **[Download dual-UI evidence Excel — webapp + mobile screenshot per check](${{ steps.upload_excel.outputs.artifact-url || '#' }})**"
            echo ""
            echo "[Download full bundle (HTML report + all screenshots + summary.json)](${{ steps.upload_bundle.outputs.artifact-url || '#' }})"
          } >> "$GITHUB_STEP_SUMMARY"

      # The gate is the ONLY thing that turns the job red on a parity failure. The emulator step is
      # continue-on-error (so artifacts always upload); without this step a failed/short/absent run
      # would report green (fail-open). Keys on summary.gateFailed (hard failures, excludes the
      # documented-flaky allowlist) and treats a missing summary as failure (H2, M7).
      - name: Parity gate
        if: always()
        run: |
          if [ ! -f summary.json ]; then
            echo "::error::no summary.json produced — verification did not complete (see artifacts/logs)"; exit 1
          fi
          node -e "const s=require('./summary.json');console.log('gate: '+s.passed+'/'+s.total+' PASS, failed='+s.failed+', gateFailed='+s.gateFailed);if(s.gateFailed){console.error('::error::parity gate FAILED');process.exit(1)}console.log('parity gate PASS')"
