name: UI Change Detector Mobile (Android Emulator)

on:
  workflow_dispatch:
    inputs:
      run_detector:
        description: "UI Change Detector Mobile (Android Emulator)"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  detector:
    if: ${{ inputs.run_detector }}
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Validate mobile secrets
        shell: bash
        env:
          MAESTRO_APP_EMAIL: ${{ secrets.HYDROCERT_MOBILE_QA_EMAIL }}
          MAESTRO_APP_PASSWORD: ${{ secrets.HYDROCERT_MOBILE_QA_PASSWORD }}
        run: |
          if [[ -z "${MAESTRO_APP_EMAIL}" || -z "${MAESTRO_APP_PASSWORD}" ]]; then
            echo "::error::Missing HYDROCERT_MOBILE_QA_EMAIL or HYDROCERT_MOBILE_QA_PASSWORD secret"
            exit 1
          fi
          echo "Mobile secrets present"

      - name: Run UI Change Detector on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          emulator-boot-timeout: 600
          script: bash $GITHUB_WORKSPACE/scripts/run-mobile-v2-qa-check.sh
        env:
          GH_TOKEN: ${{ github.token }}
          MAESTRO_APP_EMAIL: ${{ secrets.HYDROCERT_MOBILE_QA_EMAIL }}
          MAESTRO_APP_PASSWORD: ${{ secrets.HYDROCERT_MOBILE_QA_PASSWORD }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-change-detector-${{ github.run_id }}
          path: qa-artifacts/change-detector/
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish workflow summary
        if: always()
        shell: bash
        run: |
          {
            echo "## UI Change Detector Mobile (Android Emulator)"
            echo ""
            DETECTOR_RESULT=$(ls -1t qa-artifacts/change-detector/scan_results_*.json 2>/dev/null | head -1)
            if [[ -n "$DETECTOR_RESULT" ]]; then
              node -e "
                const s = require('./$DETECTOR_RESULT');
                const sum = s.summary || {};
                console.log('- Screens scanned: ' + (sum.screens_scanned || 0));
                console.log('- New elements found: ' + (sum.total_new_elements || 0));
                if (sum.total_new_elements > 0) {
                  console.log('');
                  console.log('**New UI elements detected — review recommended!**');
                  for (const [name, info] of Object.entries(s.screens || {})) {
                    const els = info.new_elements || [];
                    if (els.length > 0) {
                      console.log('  - ' + name + ': ' + els.length + ' new element(s)');
                    }
                  }
                } else {
                  console.log('');
                  console.log('All screens match baseline. No new elements detected.');
                }
              " 2>/dev/null || echo "Scan results parse failed"
            else
              echo "No scan results found — scanner may have failed. Check logs."
            fi
            echo ""
            echo "Artifact: ui-change-detector-${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"
