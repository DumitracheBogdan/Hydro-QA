# =============================================
# SIDEBAR NAVIGATION TEST
# Tests all sidebar links and their destinations
# =============================================

- openLink: https://dev.gen-cert.com/login
- tapOn:
    text: "you@example.com"
- inputText: ${MAESTRO_APP_EMAIL}
- tapOn:
    text: "Password"
- inputText: ${MAESTRO_APP_PASSWORD}
- tapOn:
    text: "Sign in"

# === MAIN MENU SECTION ===

# --- Dashboard Link ---
- tapOn:
    text: "Dashboard"
- assertVisible: "Visits"

# --- Customers Link ---
# NOTE: Currently links to /visits (placeholder - no dedicated page)
- tapOn:
    text: "Customers"

# --- Schedule Dropdown ---
- tapOn:
    text: "Schedule"
# Sub-items appear:

# --- Schedule > Visits ---
- tapOn:
    text: "Visits"
- assertVisible: "Visits"

# --- Schedule > Planner ---
- tapOn:
    text: "Schedule"
- tapOn:
    text: "Planner"

# --- Visits List Link ---
- tapOn:
    text: "Visits List"
- assertVisible: "Visit Reference"

