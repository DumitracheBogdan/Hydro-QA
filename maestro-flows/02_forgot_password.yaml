appId: dev.gen-cert.com
name: "Forgot Password Flow"
tags:
  - login
  - forgot-password
  - smoke
---

# =============================================
# FORGOT PASSWORD - https://dev.gen-cert.com/login
# =============================================

- openLink: https://dev.gen-cert.com/login

# --- Click Forgot password? ---
- tapOn:
    text: "Forgot password?"
- assertVisible: "Forgot Password"
- assertVisible: "Enter your email address and we'll send you a link to reset your password."

# --- Email Input ---
- tapOn:
    text: "you@example.com"
- inputText: "test@hydrocert.com"

# --- Send Reset Link Button ---
- tapOn:
    text: "Send Reset Link"

# --- Back to Login Button ---
- tapOn:
    text: "Back to Login"
- assertVisible: "Login to your account"
